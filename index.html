<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helcia i Tadzio – Gra Kuchenna!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  background: #000;
}

.screen {
  position: absolute; inset: 0;
  display: none;
}
.screen.active { display: flex; }

/* ─── LANDING ─────────────────────────────────────────── */
#landing {
  flex-direction: column;
  align-items: stretch;
  /* kitchen wall tiles */
  background-color: #FFF5E0;
  background-image:
    linear-gradient(45deg, #E8D5A3 25%, transparent 25%),
    linear-gradient(-45deg, #E8D5A3 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #E8D5A3 75%),
    linear-gradient(-45deg, transparent 75%, #E8D5A3 75%);
  background-size: 80px 80px;
  background-position: 0 0, 0 40px, 40px -40px, -40px 0px;
}

/* top cabinet row */
.cabinet-top {
  width: 100%; height: clamp(90px, 13vh, 140px);
  background: linear-gradient(180deg, #5A3010 0%, #7B4A25 60%, #9B6B4A 100%);
  display: flex; align-items: center; padding: 10px 16px; gap: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  flex-shrink: 0; overflow: hidden;
}
.cab-door {
  flex: 1; height: 80%; max-width: 160px;
  background: linear-gradient(135deg, #A87550 0%, #7A5030 50%, #A87550 100%);
  border-radius: 7px; border: 3px solid #4A2808;
  position: relative;
  box-shadow: inset 0 2px 5px rgba(255,255,255,0.2), inset 0 -2px 5px rgba(0,0,0,0.25);
}
.cab-door::after {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 36px; height: 10px;
  background: linear-gradient(180deg, #D4A060 0%, #A07030 100%);
  border-radius: 5px; border: 1.5px solid #6B4820;
}

/* middle content */
.landing-mid {
  flex: 1; display: flex;
  align-items: center; justify-content: space-around;
  padding: 10px 5vw;
  overflow: hidden;
}

.char-col {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
}
.char-col svg {
  filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.3));
  animation: bob 3s ease-in-out infinite;
}
.char-col:nth-child(3) svg { animation-delay: -1.5s; }
@keyframes bob {
  0%,100% { transform: translateY(0px) rotate(-1deg); }
  50%      { transform: translateY(-12px) rotate(1deg); }
}
.char-name {
  font-size: clamp(22px, 3vw, 38px);
  font-weight: 900; color: #5A3010;
  text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
}
.controls-tag {
  font-size: clamp(13px, 1.6vw, 20px);
  background: rgba(255,255,255,0.75);
  padding: 4px 14px; border-radius: 20px; color: #6B4020;
}

/* title block */
.title-block {
  text-align: center; display: flex; flex-direction: column;
  align-items: center; gap: clamp(10px, 2vh, 24px);
}
.game-title {
  font-size: clamp(36px, 7vw, 96px);
  font-weight: 900; line-height: 1.05;
  color: #8B2000;
  text-shadow:
    4px 4px 0 #FF8C00,
    8px 8px 0 rgba(0,0,0,0.18);
}
.game-sub {
  font-size: clamp(16px, 2.2vw, 28px);
  color: #7B4820;
  background: rgba(255,255,255,0.75);
  padding: 8px 24px; border-radius: 24px;
}
.start-btn {
  font-size: clamp(22px, 3vw, 42px);
  font-weight: 900;
  font-family: inherit;
  background: linear-gradient(180deg, #FF7035 0%, #E63000 100%);
  color: #fff;
  border: 4px solid #B02000;
  border-radius: 60px;
  padding: clamp(12px,2vh,20px) clamp(30px,5vw,70px);
  cursor: pointer;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  box-shadow: 0 7px 0 #B02000, 0 9px 18px rgba(0,0,0,0.3);
  transition: transform .1s, box-shadow .1s;
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.06); }
}
.start-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 0 #B02000, 0 12px 22px rgba(0,0,0,0.3); }
.start-btn:active { transform: translateY(5px);  box-shadow: 0 2px 0  #B02000, 0 4px 10px rgba(0,0,0,0.2); animation: none; }

/* bottom counter */
.counter-bottom {
  width: 100%; height: clamp(60px, 9vh, 100px);
  background: linear-gradient(180deg, #9B6B4A 0%, #7A4A28 100%);
  border-top: 6px solid #4A2808;
  display: flex; align-items: center; justify-content: space-evenly;
  padding: 0 20px; flex-shrink: 0;
}
.counter-bottom span { font-size: clamp(28px, 4vw, 50px); }

/* ─── GAME SCREEN ─────────────────────────────────────── */
#game-screen {
  background: #000;
}
#gameCanvas {
  display: block;
  width: 100%; height: 100%;
}

/* ─── RESULT SCREEN ───────────────────────────────────── */
#result-screen {
  flex-direction: column; align-items: center; justify-content: center;
  gap: 28px;
  background: radial-gradient(ellipse at center, rgba(80,30,0,0.92) 0%, rgba(20,10,0,0.97) 100%);
}
.result-winner {
  font-size: clamp(40px, 8vw, 90px);
  font-weight: 900; color: #FFD700;
  text-shadow: 3px 3px 0 #FF8C00, 6px 6px 20px rgba(255,200,0,0.5);
  text-align: center;
}
.result-scores {
  font-size: clamp(22px, 3.5vw, 42px);
  color: #FFF8E0;
  text-align: center; line-height: 1.9;
}
.play-again-btn {
  font-size: clamp(20px, 2.8vw, 36px);
  font-weight: 900; font-family: inherit;
  background: linear-gradient(180deg, #4CD964 0%, #228B22 100%);
  color: #fff; border: 4px solid #145214;
  border-radius: 60px;
  padding: 14px 55px; cursor: pointer;
  box-shadow: 0 7px 0 #145214;
  text-shadow: 1px 2px 0 rgba(0,0,0,0.3);
}
.play-again-btn:hover { transform: translateY(-2px); }
.play-again-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 #145214; }
</style>
</head>

<script>
'use strict';

/* ─────────────────────────────────────────────────────────────
   CABINET DOOR GENERATOR (landing)
───────────────────────────────────────────────────────────── */
(function buildCabinets() {
  const el = document.getElementById('cabTop');
  const count = Math.ceil(window.innerWidth / 174) + 1;
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'cab-door';
    el.appendChild(d);
  }
})();

/* ─────────────────────────────────────────────────────────────
   SCREEN HELPER
───────────────────────────────────────────────────────────── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ─────────────────────────────────────────────────────────────
   BACKGROUND MUSIC  (Web Audio API)
───────────────────────────────────────────────────────────── */
class Music {
  constructor() {
    this.ctx = null;
    this.active = false;
    this.nextLoopAt = 0;
    this._schedTimer = null;

    // Cheerful 8-bar melody in C major — "kitchen folk" feel
    const C4=261.63,D4=293.66,E4=329.63,F4=349.23,G4=392,A4=440,B4=493.88,
          C5=523.25,D5=587.33,E5=659.25,G5=784;
    this.melody = [
      [E5,.18],[E5,.18],[R=0,.10],[E5,.18],[R,.10],[C5,.18],[E5,.36],[G5,.36],[G4,.36],
      [C5,.27],[G4,.18],[R,.18],[E4,.27],[A4,.18],[B4,.18],[Bb4=466.16,.18],[A4,.36],
      [G4,.24],[E5,.24],[G5,.24],[A5=880,.36],[F5=698.46,.18],[G5,.18],[R,.18],[E5,.36],[C5,.18],[D5,.18],[B4,.36],
      [C5,.27],[G4,.18],[R,.18],[E4,.27],[A4,.18],[B4,.18],[Bb4,.18],[A4,.36],
      [G4,.24],[E5,.24],[G5,.24],[A5,.36],[F5,.18],[G5,.18],[R,.18],[E5,.36],[C5,.18],[D5,.18],[B4,.36],
    ];
    this.totalDur = this.melody.reduce((s,[,d])=>s+d, 0);
  }

  start() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.active = true;
    this.scheduleLoop(this.ctx.currentTime + 0.05);
  }

  scheduleLoop(t0) {
    if (!this.active) return;
    let t = t0;
    for (const [freq, dur] of this.melody) {
      if (freq) {
        this._note(freq,    t, dur * .88, 'square',   .07);
        this._note(freq/2,  t, dur * .45, 'triangle', .04);
      }
      t += dur;
    }
    this.nextLoopAt = t0 + this.totalDur;
    const waitMs = Math.max(0, (this.nextLoopAt - this.ctx.currentTime - .6) * 1000);
    this._schedTimer = setTimeout(() => this.scheduleLoop(this.nextLoopAt), waitMs);
  }

  _note(freq, t, dur, type, vol) {
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.connect(g); g.connect(this.ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur + .02);
  }

  stop() {
    this.active = false;
    clearTimeout(this._schedTimer);
    if (this.ctx) { this.ctx.close(); this.ctx = null; }
  }
}

const music = new Music();

/* ─────────────────────────────────────────────────────────────
   CANVAS GAME
───────────────────────────────────────────────────────────── */
const canvas = document.getElementById('gameCanvas');
const c = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* ── palette & sizes derived from canvas ── */
const FOODS = ['🍎','🥕','🥔','🍅','🥦','🧅','🍋','🥒','🍄','🍓','🫐','🍇','🧁','🍕','🧀'];

class Game {
  constructor() {
    this.W = canvas.width;
    this.H = canvas.height;
    this.CAB_H   = Math.floor(this.H * 0.12);
    this.FLOOR_Y = Math.floor(this.H * 0.83);
    this.CTR_H   = Math.floor(this.H * 0.09);

    const pW = 72, pH = 108;

    /* Helcia – left */
    this.helcia = {
      name:'Helcia', x: this.W*.15, y: this.FLOOR_Y - pH,
      w:pW, h:pH, speed:7,
      score:0, lives:3,
      color:'#E0458A', isGirl:true,
      limit:[pW/2+10, this.W/2 - pW/2 - 5],
    };
    /* Tadzio – right */
    this.tadzio = {
      name:'Tadzio', x: this.W*.85, y: this.FLOOR_Y - pH,
      w:pW, h:pH, speed:7,
      score:0, lives:3,
      color:'#3A6FD8', isGirl:false,
      limit:[this.W/2 + pW/2 + 5, this.W - pW/2 - 10],
    };

    this.foods   = [];
    this.effects = [];
    this.misses  = [];
    this.frame   = 0;
    this.timeLeft= 60;
    this.spawnEvery = 80;
    this.running = true;
    this.keys    = {};

    this._onKey = (e) => { this.keys[e.key] = (e.type==='keydown'); };
    window.addEventListener('keydown', this._onKey);
    window.addEventListener('keyup',   this._onKey);

    requestAnimationFrame(() => this._loop());
  }

  destroy() {
    this.running = false;
    window.removeEventListener('keydown', this._onKey);
    window.removeEventListener('keyup',   this._onKey);
  }

  _loop() {
    if (!this.running) return;
    this.W = canvas.width; this.H = canvas.height;
    this._update();
    this._draw();
    requestAnimationFrame(() => this._loop());
  }

  /* ── UPDATE ── */
  _update() {
    this.frame++;

    /* timer */
    if (this.frame % 60 === 0) {
      this.timeLeft = Math.max(0, this.timeLeft - 1);
      if (this.timeLeft === 0) { this._end(); return; }
    }

    /* player move */
    this._movePlayer(this.helcia, this.keys['a']||this.keys['A'], this.keys['d']||this.keys['D']);
    this._movePlayer(this.tadzio, this.keys['ArrowLeft'], this.keys['ArrowRight']);

    /* spawn food */
    this.spawnEvery = Math.max(40, 80 - Math.floor((60-this.timeLeft)/8)*5);
    if (this.frame % this.spawnEvery === 0) this._spawnFood();

    /* update food */
    for (const f of this.foods) {
      f.y += f.vy;
      if (f.caught || f.missed) { f.alpha -= 0.06; continue; }

      /* catch zone at knee height */
      if (f.y >= this.FLOOR_Y - this.helcia.h * .35) {
        if (this._collides(f, this.helcia)) { f.caught=true; this.helcia.score++; this._spark(f.x,f.y,this.helcia.color); continue; }
        if (this._collides(f, this.tadzio)) { f.caught=true; this.tadzio.score++; this._spark(f.x,f.y,this.tadzio.color); continue; }
      }

      /* hit floor */
      if (f.y >= this.FLOOR_Y + 10) {
        f.missed = true;
        const closer = Math.abs(f.x-this.helcia.x) < Math.abs(f.x-this.tadzio.x) ? this.helcia : this.tadzio;
        closer.lives = Math.max(0, closer.lives - 1);
        this.misses.push({x:f.x, y:this.FLOOR_Y, alpha:1});
        if (this.helcia.lives===0 || this.tadzio.lives===0) { this._end(); return; }
      }
    }
    this.foods = this.foods.filter(f => f.alpha > 0);

    /* update effects */
    for (const e of this.effects) { e.r+=4; e.alpha-=.07; }
    this.effects = this.effects.filter(e=>e.alpha>0);
    for (const m of this.misses)  { m.alpha-=.04; }
    this.misses  = this.misses.filter(m=>m.alpha>0);
  }

  _movePlayer(p, left, right) {
    if (left)  p.x -= p.speed;
    if (right) p.x += p.speed;
    p.x = Math.max(p.limit[0], Math.min(p.limit[1], p.x));
  }

  _spawnFood() {
    const margin = 60;
    this.foods.push({
      x: margin + Math.random()*(this.W - margin*2),
      y: this.CAB_H + 5,
      vy: 2.5 + Math.random()*3.5,
      emoji: FOODS[Math.floor(Math.random()*FOODS.length)],
      size: 38,
      caught:false, missed:false, alpha:1,
    });
  }

  _collides(f, p) {
    return Math.abs(f.x - p.x) < p.w * .85;
  }

  _spark(x, y, col) {
    this.effects.push({x, y, r:8, color:col, alpha:1});
  }

  _end() {
    this.running = false;
    const h = this.helcia, t = this.tadzio;
    let title;
    if (h.score > t.score)      title = '🎉 Helcia wygrywa! 🎉';
    else if (t.score > h.score) title = '🎉 Tadzio wygrywa! 🎉';
    else                         title = '🤝 Remis! Oboje świetni! 🤝';

    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultScores').innerHTML =
      `👧 Helcia: <strong>${h.score}</strong> pkt &nbsp;|&nbsp; Tadzio: <strong>${t.score}</strong> pkt 👦`;

    setTimeout(()=>showScreen('result-screen'), 600);
  }

  /* ── DRAW ── */
  _draw() {
    c.clearRect(0,0,this.W,this.H);
    this._drawBg();
    this._drawMisses();
    this._drawFoods();
    this._drawEffects();
    this._drawPlayer(this.helcia);
    this._drawPlayer(this.tadzio);
    this._drawHUD();
    this._drawDivider();
  }

  _drawBg() {
    const {W,H,CAB_H,FLOOR_Y,CTR_H} = this;

    /* wall tiles */
    const ts = 68;
    for (let tx=0; tx<W; tx+=ts)
      for (let ty=CAB_H; ty<FLOOR_Y; ty+=ts) {
        const r=Math.floor((ty-CAB_H)/ts), col=Math.floor(tx/ts);
        c.fillStyle = (r+col)%2===0 ? '#F8EDCF' : '#EDE0B8';
        c.fillRect(tx,ty,ts,ts);
        c.strokeStyle='#D4C090'; c.lineWidth=.7;
        c.strokeRect(tx,ty,ts,ts);
      }

    /* floor checkered */
    const fs=72;
    for (let tx=0; tx<W; tx+=fs)
      for (let ty=FLOOR_Y; ty<H-CTR_H; ty+=fs) {
        const r=Math.floor((ty-FLOOR_Y)/fs), col=Math.floor(tx/fs);
        c.fillStyle=(r+col)%2===0?'#F0E8C0':'#CEC080';
        c.fillRect(tx,ty,fs,fs);
        c.strokeStyle='#B8A860'; c.lineWidth=.5;
        c.strokeRect(tx,ty,fs,fs);
      }

    /* baseboard */
    c.fillStyle='#7A5030';
    c.fillRect(0, FLOOR_Y-8, W, 8);

    /* ── top cabinets ── */
    // wood base
    c.fillStyle='#5A3010';
    c.fillRect(0,0,W,CAB_H);
    // underside gradient
    const sg=c.createLinearGradient(0,CAB_H-12,0,CAB_H+12);
    sg.addColorStop(0,'rgba(0,0,0,.35)'); sg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=sg; c.fillRect(0,CAB_H-10,W,22);

    // cabinet doors
    const dW=Math.min(160, W/7), gap=16;
    const total=dW+gap;
    const startX=((W%(total)))/2;
    const count=Math.ceil(W/total)+1;
    for (let i=0;i<count;i++){
      const dx=startX+i*total-gap/2, dy=8, dh=CAB_H-16;
      // door body
      const dg=c.createLinearGradient(dx,dy,dx,dy+dh);
      dg.addColorStop(0,'#C08050'); dg.addColorStop(.4,'#9B6B40'); dg.addColorStop(1,'#7A4828');
      c.fillStyle=dg;
      this._roundRect(dx,dy,dW,dh,6);
      c.fill();
      // inset panel
      c.strokeStyle='#4A2408'; c.lineWidth=2.5;
      this._roundRect(dx,dy,dW,dh,6); c.stroke();
      c.strokeStyle='rgba(255,255,255,.18)'; c.lineWidth=1;
      this._roundRect(dx+5,dy+5,dW-10,dh-10,4); c.stroke();
      // handle
      c.fillStyle='#D4A050';
      this._roundRect(dx+dW/2-18,dy+dh/2-5,36,10,5); c.fill();
      c.strokeStyle='#8B5820'; c.lineWidth=1.5; c.stroke();
    }

    /* ── bottom counter ── */
    const cy=H-CTR_H;
    const cg=c.createLinearGradient(0,cy,0,H);
    cg.addColorStop(0,'#A07048'); cg.addColorStop(1,'#6B4020');
    c.fillStyle=cg; c.fillRect(0,cy,W,CTR_H);
    c.fillStyle='#4A2808'; c.fillRect(0,cy,W,7);
    c.fillStyle='rgba(255,255,255,.15)'; c.fillRect(0,cy+7,W,4);

    // counter items
    const items=['🍳','🥘','🍲','☕','🥄','🍴','🧂'];
    const emSz=Math.min(CTR_H*.65,44);
    c.font=`${emSz}px serif`; c.textBaseline='middle'; c.textAlign='center';
    const sp=W/(items.length+1);
    items.forEach((it,i)=>c.fillText(it, sp*(i+1), cy+CTR_H/2));

    /* side wall accents – fridge hint left */
    c.fillStyle='#DDDDE4';
    c.fillRect(0,CAB_H,18,FLOOR_Y-CAB_H);
    c.fillStyle='#CCC';
    ['#DDD','#CCC'].forEach((clr,i)=>{
      c.fillStyle=clr;
      c.fillRect(2,CAB_H+16+i*((FLOOR_Y-CAB_H-32)/2),14,(FLOOR_Y-CAB_H-32)/2-4);
    });
    /* right – thin window sill */
    c.fillStyle='#DDDDE4';
    c.fillRect(W-18,CAB_H,18,FLOOR_Y-CAB_H);
  }

  _drawDivider() {
    // subtle center dividing line
    c.save();
    c.setLineDash([12,10]);
    c.strokeStyle='rgba(0,0,0,0.1)';
    c.lineWidth=2;
    c.beginPath();
    c.moveTo(this.W/2, this.CAB_H+10);
    c.lineTo(this.W/2, this.FLOOR_Y);
    c.stroke();
    c.setLineDash([]);
    c.restore();
  }

  _drawPlayer(p) {
    const {x,y,w,h,isGirl,color} = p;

    /* body */
    const bodyGrad = c.createLinearGradient(x-w/2, y, x+w/2, y+h);
    bodyGrad.addColorStop(0, isGirl?'#FF85B8':'#5A9FEC');
    bodyGrad.addColorStop(1, isGirl?'#CC2070':'#1A50B0');
    c.fillStyle=bodyGrad;
    this._roundRect(x-w/2, y+h*.3, w, h*.6, 10);
    c.fill();

    /* legs */
    c.fillStyle=isGirl?'#E01070':'#1040A0';
    c.fillRect(x-w/2+6,  y+h*.82, w/2-10, h*.18);
    c.fillRect(x+4,       y+h*.82, w/2-10, h*.18);

    /* shoes */
    c.fillStyle='#2A1A0A';
    c.beginPath(); c.ellipse(x-w/4, y+h+6, 16,7,0,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(x+w/4, y+h+6, 16,7,0,0,Math.PI*2); c.fill();

    /* arms stretched out */
    c.strokeStyle=isGirl?'#FF85B8':'#5A9FEC';
    c.lineWidth=11; c.lineCap='round';
    c.beginPath(); c.moveTo(x-w/2+4, y+h*.45); c.lineTo(x-w/2-28, y+h*.64); c.stroke();
    c.beginPath(); c.moveTo(x+w/2-4, y+h*.45); c.lineTo(x+w/2+28, y+h*.64); c.stroke();
    // hands
    c.fillStyle='#FFD0A0';
    c.beginPath(); c.arc(x-w/2-28, y+h*.64, 9,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(x+w/2+28, y+h*.64, 9,0,Math.PI*2); c.fill();

    /* head */
    const headR=28;
    c.fillStyle='#FFD8A8';
    c.beginPath(); c.arc(x, y+h*.18, headR,0,Math.PI*2); c.fill();

    /* hair */
    c.fillStyle=isGirl?'#3D1C00':'#D4AE40';
    c.beginPath(); c.arc(x, y+h*.14, headR+2, Math.PI*.95, Math.PI*.05); c.fill();
    if (isGirl) {
      // pigtails
      c.beginPath(); c.ellipse(x-headR-8, y+h*.24, 8,18,-0.3,0,Math.PI*2); c.fill();
      c.beginPath(); c.ellipse(x+headR+8, y+h*.24, 8,18, 0.3,0,Math.PI*2); c.fill();
    }

    /* eyes */
    c.fillStyle='#fff';
    c.beginPath(); c.ellipse(x-10, y+h*.19, 7,8,0,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(x+10, y+h*.19, 7,8,0,0,Math.PI*2); c.fill();
    c.fillStyle=isGirl?'#5C2D00':'#3A6FD8';
    c.beginPath(); c.ellipse(x-10, y+h*.20, 4.5,5.5,0,0,Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(x+10, y+h*.20, 4.5,5.5,0,0,Math.PI*2); c.fill();
    c.fillStyle='#fff';
    c.beginPath(); c.arc(x-8, y+h*.185, 2.2,0,Math.PI*2); c.fill();
    c.beginPath(); c.arc(x+12, y+h*.185, 2.2,0,Math.PI*2); c.fill();

    /* mouth */
    c.strokeStyle='#AA3333'; c.lineWidth=2.2;
    c.beginPath(); c.arc(x, y+h*.27, 8, .15, Math.PI-.15); c.stroke();

    /* name tag */
    c.font=`bold ${Math.floor(h*.15)}px 'Comic Sans MS', cursive`;
    c.textAlign='center'; c.textBaseline='bottom';
    c.fillStyle=color;
    c.strokeStyle='rgba(255,255,255,0.9)'; c.lineWidth=3;
    c.strokeText(p.name, x, y-4);
    c.fillText(p.name, x, y-4);
  }

  _drawFoods() {
    for (const f of this.foods) {
      if (f.alpha<=0) continue;
      c.save();
      c.globalAlpha=f.alpha;
      c.font=`${f.size}px serif`;
      c.textAlign='center'; c.textBaseline='middle';
      c.fillText(f.emoji, f.x, f.y);
      c.restore();
    }
  }

  _drawEffects() {
    for (const e of this.effects) {
      c.save();
      c.globalAlpha=e.alpha;
      c.strokeStyle=e.color; c.lineWidth=3;
      c.beginPath(); c.arc(e.x,e.y,e.r,0,Math.PI*2); c.stroke();
      // inner burst
      c.strokeStyle='#FFD700'; c.lineWidth=1.5;
      c.beginPath(); c.arc(e.x,e.y,e.r*.6,0,Math.PI*2); c.stroke();
      c.restore();
    }
    for (const m of this.misses) {
      c.save(); c.globalAlpha=m.alpha;
      c.fillStyle='#FF2200';
      c.font='bold 28px serif'; c.textAlign='center'; c.textBaseline='middle';
      c.fillText('💥',m.x,m.y);
      c.restore();
    }
  }

  _drawMisses() {} // handled in _drawEffects

  _drawHUD() {
    const {W,CAB_H,helcia,tadzio,timeLeft} = this;
    const bY=CAB_H+8, bH=48, bW=220;

    /* Helcia HUD */
    c.fillStyle='rgba(220,50,130,0.82)';
    this._roundRect(8,bY,bW,bH,10); c.fill();
    c.fillStyle='#fff';
    c.font=`bold 17px 'Comic Sans MS', cursive`;
    c.textAlign='left'; c.textBaseline='middle';
    c.fillText(`👧 Helcia: ${helcia.score} pkt`, 18, bY+bH/2-8);
    c.fillText('❤️'.repeat(helcia.lives)+'🖤'.repeat(3-helcia.lives), 18, bY+bH/2+12);

    /* Tadzio HUD */
    c.fillStyle='rgba(40,100,220,0.82)';
    this._roundRect(W-bW-8,bY,bW,bH,10); c.fill();
    c.fillStyle='#fff';
    c.textAlign='right';
    c.fillText(`Tadzio: ${tadzio.score} pkt 👦`, W-18, bY+bH/2-8);
    c.fillText('❤️'.repeat(tadzio.lives)+'🖤'.repeat(3-tadzio.lives), W-18, bY+bH/2+12);

    /* Timer */
    const ticking=timeLeft<=10;
    c.fillStyle=`rgba(0,0,0,${ticking?.7:.6})`;
    this._roundRect(W/2-60,bY,120,bH,10); c.fill();
    if (ticking) { c.fillStyle='rgba(255,50,0,.25)'; this._roundRect(W/2-60,bY,120,bH,10); c.fill(); }
    c.fillStyle=ticking?'#FF4400':'#FFF';
    c.font=`bold ${ticking?26:20}px 'Comic Sans MS', cursive`;
    c.textAlign='center'; c.textBaseline='middle';
    c.fillText(`⏱ ${timeLeft}s`, W/2, bY+bH/2);

    /* controls hint */
    c.font='13px Arial,sans-serif';
    c.fillStyle='rgba(80,40,0,.65)';
    c.textAlign='left';  c.textBaseline='top';
    c.fillText('A / D ← Helcia', 10, CAB_H-18);
    c.textAlign='right';
    c.fillText('Tadzio → ◄ ►', W-10, CAB_H-18);
  }

  _roundRect(x,y,w,h,r) {
    c.beginPath();
    c.moveTo(x+r,y);
    c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
    c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
    c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
    c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
    c.closePath();
  }
}

/* ─────────────────────────────────────────────────────────────
   WIRING
───────────────────────────────────────────────────────────── */
let currentGame = null;

function startGame() {
  music.start();
  showScreen('game-screen');
  if (currentGame) currentGame.destroy();
  currentGame = new Game();
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('playAgainBtn').addEventListener('click', startGame);
</script>
