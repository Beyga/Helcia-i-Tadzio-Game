<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helcia i Tadzio – Gra Kuchenna!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  background: #000;
}

.screen {
  position: absolute; inset: 0;
  display: none;
}
.screen.active { display: flex; }

/* ─── LANDING ─────────────────────────────────────────── */
#landing {
  flex-direction: column;
  align-items: stretch;
  /* kitchen wall tiles */
  background-color: #FFF5E0;
  background-image:
    linear-gradient(45deg, #E8D5A3 25%, transparent 25%),
    linear-gradient(-45deg, #E8D5A3 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #E8D5A3 75%),
    linear-gradient(-45deg, transparent 75%, #E8D5A3 75%);
  background-size: 80px 80px;
  background-position: 0 0, 0 40px, 40px -40px, -40px 0px;
}

/* top cabinet row */
.cabinet-top {
  width: 100%; height: clamp(90px, 13vh, 140px);
  background: linear-gradient(180deg, #5A3010 0%, #7B4A25 60%, #9B6B4A 100%);
  display: flex; align-items: center; padding: 10px 16px; gap: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  flex-shrink: 0; overflow: hidden;
}
.cab-door {
  flex: 1; height: 80%; max-width: 160px;
  background: linear-gradient(135deg, #A87550 0%, #7A5030 50%, #A87550 100%);
  border-radius: 7px; border: 3px solid #4A2808;
  position: relative;
  box-shadow: inset 0 2px 5px rgba(255,255,255,0.2), inset 0 -2px 5px rgba(0,0,0,0.25);
}
.cab-door::after {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 36px; height: 10px;
  background: linear-gradient(180deg, #D4A060 0%, #A07030 100%);
  border-radius: 5px; border: 1.5px solid #6B4820;
}

/* middle content */
.landing-mid {
  flex: 1; display: flex;
  align-items: center; justify-content: space-around;
  padding: 10px 5vw;
  overflow: hidden;
}

.char-col {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
}
.char-col svg {
  filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.3));
  animation: bob 3s ease-in-out infinite;
}
.char-col:nth-child(3) svg { animation-delay: -1.5s; }
@keyframes bob {
  0%,100% { transform: translateY(0px) rotate(-1deg); }
  50%      { transform: translateY(-12px) rotate(1deg); }
}
.char-name {
  font-size: clamp(22px, 3vw, 38px);
  font-weight: 900; color: #5A3010;
  text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
}
.controls-tag {
  font-size: clamp(13px, 1.6vw, 20px);
  background: rgba(255,255,255,0.75);
  padding: 4px 14px; border-radius: 20px; color: #6B4020;
}

/* title block */
.title-block {
  text-align: center; display: flex; flex-direction: column;
  align-items: center; gap: clamp(10px, 2vh, 24px);
}
.game-title {
  font-size: clamp(36px, 7vw, 96px);
  font-weight: 900; line-height: 1.05;
  color: #8B2000;
  text-shadow:
    4px 4px 0 #FF8C00,
    8px 8px 0 rgba(0,0,0,0.18);
}
.game-sub {
  font-size: clamp(16px, 2.2vw, 28px);
  color: #7B4820;
  background: rgba(255,255,255,0.75);
  padding: 8px 24px; border-radius: 24px;
}
.start-btn {
  font-size: clamp(22px, 3vw, 42px);
  font-weight: 900;
  font-family: inherit;
  background: linear-gradient(180deg, #FF7035 0%, #E63000 100%);
  color: #fff;
  border: 4px solid #B02000;
  border-radius: 60px;
  padding: clamp(12px,2vh,20px) clamp(30px,5vw,70px);
  cursor: pointer;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  box-shadow: 0 7px 0 #B02000, 0 9px 18px rgba(0,0,0,0.3);
  transition: transform .1s, box-shadow .1s;
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.06); }
}
.start-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 0 #B02000, 0 12px 22px rgba(0,0,0,0.3); }
.start-btn:active { transform: translateY(5px);  box-shadow: 0 2px 0  #B02000, 0 4px 10px rgba(0,0,0,0.2); animation: none; }

/* bottom counter */
.counter-bottom {
  width: 100%; height: clamp(60px, 9vh, 100px);
  background: linear-gradient(180deg, #9B6B4A 0%, #7A4A28 100%);
  border-top: 6px solid #4A2808;
  display: flex; align-items: center; justify-content: space-evenly;
  padding: 0 20px; flex-shrink: 0;
}
.counter-bottom span { font-size: clamp(28px, 4vw, 50px); }

/* ─── GAME SCREEN ─────────────────────────────────────── */
#game-screen {
  background: #000;
}
#gameCanvas {
  display: block;
  width: 100%; height: 100%;
}

/* ─── RESULT SCREEN ───────────────────────────────────── */
#result-screen {
  flex-direction: column; align-items: center; justify-content: center;
  gap: 28px;
  background: radial-gradient(ellipse at center, rgba(80,30,0,0.92) 0%, rgba(20,10,0,0.97) 100%);
}
.result-winner {
  font-size: clamp(40px, 8vw, 90px);
  font-weight: 900; color: #FFD700;
  text-shadow: 3px 3px 0 #FF8C00, 6px 6px 20px rgba(255,200,0,0.5);
  text-align: center;
}
.result-scores {
  font-size: clamp(22px, 3.5vw, 42px);
  color: #FFF8E0;
  text-align: center; line-height: 1.9;
}
.play-again-btn {
  font-size: clamp(20px, 2.8vw, 36px);

  background: linear-gradient(180deg, #4CD964 0%, #228B22 100%);

  border-radius: 60px;
  padding: 14px 55px; cursor: pointer;
  box-shadow: 0 7px 0 #145214;
  text-shadow: 1px 2px 0 rgba(0,0,0,0.3);
}
.play-again-btn:hover { transform: translateY(-2px); }
.play-again-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 #145214; }
</style>
</head>

<script>
'use strict';

/* ─── CABINET DOORS ───────────────────────────────────── */
(function () {
  const el = document.getElementById('cabTop');
  const count = Math.ceil(window.innerWidth / 174) + 1;
  for (let i = 0; i < count; i++) {

/* ─── SCREEN HELPER ───────────────────────────────────── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ─── BACKGROUND MUSIC ────────────────────────────────── */
class Music {
  constructor() {
    this.ctx   = null;
    this.active = false;
    this._timer = null;
    const R=0, C4=261.63, D4=293.66, E4=329.63, G4=392, A4=440, B4=493.88,
          Bb4=466.16, C5=523.25, D5=587.33, E5=659.25,
          F5=698.46, G5=784, A5=880;
    this.melody = [
      [E5,.18],[E5,.18],[R,.10],[E5,.18],[R,.10],[C5,.18],[E5,.36],[G5,.36],[G4,.36],
      [C5,.27],[G4,.18],[R,.18],[E4,.27],[A4,.18],[B4,.18],[Bb4,.18],[A4,.36],
      [G4,.24],[E5,.24],[G5,.24],[A5,.36],[F5,.18],[G5,.18],[R,.18],[E5,.36],[C5,.18],[D5,.18],[B4,.36],
      [C5,.27],[G4,.18],[R,.18],[E4,.27],[A4,.18],[B4,.18],[Bb4,.18],[A4,.36],
      [G4,.24],[E5,.24],[G5,.24],[A5,.36],[F5,.18],[G5,.18],[R,.18],[E5,.36],[C5,.18],[D5,.18],[B4,.36],
    ];
    this.totalDur = this.melody.reduce((s,[,d]) => s + d, 0);
  }
  start() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.active = true;
    this._loop(this.ctx.currentTime + 0.05);
  }
  _loop(t0) {
    if (!this.active) return;
    let t = t0;
    for (const [freq, dur] of this.melody) {
      if (freq) {
        this._note(freq,   t, dur * .88, 'square',   .07);
        this._note(freq/2, t, dur * .45, 'triangle', .04);
      }
      t += dur;
    }
    const wait = Math.max(0, (t0 + this.totalDur - this.ctx.currentTime - .6) * 1000);
    this._timer = setTimeout(() => this._loop(t0 + this.totalDur), wait);
  }
  _note(freq, t, dur, type, vol) {
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.connect(g); g.connect(this.ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur + .02);
  }
  sfx(freqs) {
    if (!this.ctx) return;
    freqs.forEach(([freq, t, dur, vol=0.18]) => {
      this._note(freq, this.ctx.currentTime + t, dur, 'square', vol);
    });
  }
  stop() {
    this.active = false;
    clearTimeout(this._timer);
    if (this.ctx) { this.ctx.close(); this.ctx = null; }
  }
}
const music = new Music();

/* ─── FOOD CATALOGUE ──────────────────────────────────── */
const FOODS = [
  { e:'🍎', pts:10 }, { e:'🥕', pts:5  }, { e:'🥔', pts:5  },
  { e:'🍅', pts:10 }, { e:'🥦', pts:15 }, { e:'🧅', pts:3  },
  { e:'🍋', pts:8  }, { e:'🥒', pts:7  }, { e:'🍄', pts:12 },
  { e:'🍓', pts:15 }, { e:'🫐', pts:20 }, { e:'🍇', pts:18 },
  { e:'🧁', pts:25 }, { e:'🍕', pts:30 }, { e:'🧀', pts:12 },
];

/* ─── CANVAS SETUP ────────────────────────────────────── */
const canvas = document.getElementById('gameCanvas');
const cx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* ─── CHARACTER CONSTANTS ─────────────────────────────── */
const CHAR_H   = 160;   // total visual height
const HEAD_R   = 32;    // head radius
const BODY_TOP = 80;    // px above floor where top of torso is
const BODY_BOT = 30;    // px above floor where torso ends / legs split
const ARM_Y    = 65;    // px above floor for arm midpoint

/* ─── GAME CLASS ──────────────────────────────────────── */
class Game {
  constructor() {
    this.W       = canvas.width;
    this.H       = canvas.height;
    this.CAB_H   = Math.floor(this.H * 0.12);
    this.FLOOR_Y = Math.floor(this.H * 0.82);
    this.CTR_H   = Math.floor(this.H * 0.09);
    this.MARGIN  = 55;

    this.helcia = {
      name:'Helcia', x: this.W * 0.2,
      speed:5, score:0, color:'#E0458A', isGirl:true,
      walkPhase:0, facing:1, moving:false,
    };
    this.tadzio = {
      name:'Tadzio', x: this.W * 0.8,
      speed:5, score:0, color:'#3A6FD8', isGirl:false,
      walkPhase:0, facing:-1, moving:false,
    };

    this.foods      = [];
    this.floats     = [];   // floating score texts
    this.frame      = 0;
    this.timeLeft   = 60;
    this.running    = true;
    this.keys       = {};

    const GAME_KEYS = new Set(['a','A','d','D','ArrowLeft','ArrowRight']);
    this._onKey = (e) => {
      if (GAME_KEYS.has(e.key)) e.preventDefault();
      this.keys[e.key] = (e.type === 'keydown');
    };
    window.addEventListener('keydown', this._onKey);
    window.addEventListener('keyup',   this._onKey);

    requestAnimationFrame(() => this._loop());
  }

  destroy() {
    this.running = false;
    window.removeEventListener('keydown', this._onKey);
    window.removeEventListener('keyup',   this._onKey);
  }

  _loop() {
    if (!this.running) return;
    this.W = canvas.width;
    this.H = canvas.height;
    this._update();
    this._draw();
    requestAnimationFrame(() => this._loop());
  }

  /* ── UPDATE ───────────────────────────────────────────── */
  _update() {
    this.frame++;

    /* countdown */
    if (this.frame % 60 === 0) {
      this.timeLeft = Math.max(0, this.timeLeft - 1);
      if (this.timeLeft === 0) { this._end(); return; }
    }

    /* move players */
    const hL = this.keys['a'] || this.keys['A'];
    const hR = this.keys['d'] || this.keys['D'];
    const tL = this.keys['ArrowLeft'];
    const tR = this.keys['ArrowRight'];
    this._movePlayer(this.helcia, hL, hR);
    this._movePlayer(this.tadzio, tL, tR);

    /* spawn food — every 2 s (120 frames), faster after 30 s */
    const spawnRate = Math.max(70, 120 - Math.floor((60 - this.timeLeft) / 10) * 10);
    if (this.frame % spawnRate === 0 && this.foods.length < 6) {
      this._spawnFood();
    }

    /* update food items */
    const PICKUP_R = 52;
    for (const f of this.foods) {
      if (f.dying) { f.alpha = Math.max(0, f.alpha - 0.08); continue; }
      f.life--;
      /* fade in */
      if (f.alpha < 1) f.alpha = Math.min(1, f.alpha + 0.06);
      /* check pickup — whoever is closest and within range */
      let closest = null, minD = PICKUP_R;
      for (const p of [this.helcia, this.tadzio]) {
        const d = Math.abs(p.x - f.x);
        if (d < minD) { minD = d; closest = p; }
      }
      if (closest) {
        f.dying = true;
        closest.score += f.pts;
        this._jingle(f.pts);
        this.floats.push({
          text: `+${f.pts}`,
          x: f.x, y: this.FLOOR_Y - 90,
          vy: -1.4, alpha: 1,
          color: closest.color,
          size: Math.min(36, 26 + f.pts / 4),
        });
      }
      /* expire */
      if (f.life <= 0) f.dying = true;
    }
    this.foods = this.foods.filter(f => f.alpha > 0);

    /* update floating texts */
    for (const ft of this.floats) { ft.y += ft.vy; ft.alpha -= 0.016; }
    this.floats = this.floats.filter(ft => ft.alpha > 0);
  }

  _movePlayer(p, left, right) {
    p.moving = !!(left || right);
    if (left)  { p.x -= p.speed; p.facing = -1; }
    if (right) { p.x += p.speed; p.facing =  1; }
    if (p.moving) p.walkPhase += 0.2;
    p.x = Math.max(this.MARGIN, Math.min(this.W - this.MARGIN, p.x));
  }

  _spawnFood() {
    const item = FOODS[Math.floor(Math.random() * FOODS.length)];
    const margin = this.MARGIN + 30;
    this.foods.push({
      x: margin + Math.random() * (this.W - margin * 2),
      emoji: item.e, pts: item.pts,
      life: 300,   /* 5 seconds at 60 fps */
      alpha: 0,    /* fade in */
      dying: false,
    });
  }

  /* 3-note pickup jingle, pitch scales with item value */
  _jingle(pts) {
    const base = pts >= 20 ? 784 : pts >= 12 ? 659 : 523;
    music.sfx([
      [base,       0.00, 0.10],
      [base * 1.26,0.09, 0.10],
      [base * 1.50,0.18, 0.15],
    ]);
  }

  _end() {
    this.running = false;
    const h = this.helcia, t = this.tadzio;
    const title = h.score > t.score ? '🎉 Helcia wygrywa! 🎉'
                : t.score > h.score ? '🎉 Tadzio wygrywa! 🎉'
                :                     '🤝 Remis! Oboje świetni! 🤝';
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultScores').innerHTML =
      `👧 Helcia: <strong>${h.score}</strong> pkt &nbsp;|&nbsp; Tadzio: <strong>${t.score}</strong> pkt 👦`;
    setTimeout(() => showScreen('result-screen'), 700);
  }

  /* ── DRAW ─────────────────────────────────────────────── */
  _draw() {
    cx.clearRect(0, 0, this.W, this.H);
    this._drawBg();
    this._drawFoods();
    this._drawPlayer(this.helcia);
    this._drawPlayer(this.tadzio);
    this._drawFloats();
    this._drawHUD();
  }

  /* ── KITCHEN BACKGROUND ───────────────────────────────── */
  _drawBg() {
    const { W, H, CAB_H, FLOOR_Y, CTR_H } = this;

    /* wall tiles */
    const ts = 68;
    for (let tx = 0; tx < W; tx += ts)
      for (let ty = CAB_H; ty < FLOOR_Y; ty += ts) {
        const r = Math.floor((ty - CAB_H) / ts), col = Math.floor(tx / ts);
        cx.fillStyle = (r + col) % 2 === 0 ? '#F8EDCF' : '#EDE0B8';
        cx.fillRect(tx, ty, ts, ts);
        cx.strokeStyle = '#D4C090'; cx.lineWidth = 0.7;
        cx.strokeRect(tx, ty, ts, ts);
      }

    /* floor — checkered */
    const fs = 72;
    for (let tx = 0; tx < W; tx += fs)
      for (let ty = FLOOR_Y; ty < H - CTR_H; ty += fs) {
        const r = Math.floor((ty - FLOOR_Y) / fs), col = Math.floor(tx / fs);
        cx.fillStyle = (r + col) % 2 === 0 ? '#F0E8C0' : '#CEC080';
        cx.fillRect(tx, ty, fs, fs);
        cx.strokeStyle = '#B8A860'; cx.lineWidth = 0.5;
        cx.strokeRect(tx, ty, fs, fs);
      }

    /* baseboard */
    cx.fillStyle = '#7A5030';
    cx.fillRect(0, FLOOR_Y - 8, W, 8);

    /* cabinets top */
    cx.fillStyle = '#5A3010';
    cx.fillRect(0, 0, W, CAB_H);
    const sg = cx.createLinearGradient(0, CAB_H - 12, 0, CAB_H + 12);
    sg.addColorStop(0, 'rgba(0,0,0,.35)'); sg.addColorStop(1, 'rgba(0,0,0,0)');
    cx.fillStyle = sg; cx.fillRect(0, CAB_H - 10, W, 22);

    const dW = Math.min(160, W / 7), gap = 16, total = dW + gap;
    const startX = (W % total) / 2;
    const count  = Math.ceil(W / total) + 1;
    for (let i = 0; i < count; i++) {
      const dx = startX + i * total - gap / 2, dy = 8, dh = CAB_H - 16;
      const dg = cx.createLinearGradient(dx, dy, dx, dy + dh);
      dg.addColorStop(0, '#C08050'); dg.addColorStop(.4, '#9B6B40'); dg.addColorStop(1, '#7A4828');
      cx.fillStyle = dg; this._rr(dx, dy, dW, dh, 6); cx.fill();
      cx.strokeStyle = '#4A2408'; cx.lineWidth = 2.5;
      this._rr(dx, dy, dW, dh, 6); cx.stroke();
      cx.strokeStyle = 'rgba(255,255,255,.18)'; cx.lineWidth = 1;
      this._rr(dx + 5, dy + 5, dW - 10, dh - 10, 4); cx.stroke();
      cx.fillStyle = '#D4A050';
      this._rr(dx + dW / 2 - 18, dy + dh / 2 - 5, 36, 10, 5); cx.fill();
      cx.strokeStyle = '#8B5820'; cx.lineWidth = 1.5; cx.stroke();
    }

    /* counter bottom */
    const cy = H - CTR_H;
    const cg = cx.createLinearGradient(0, cy, 0, H);
    cg.addColorStop(0, '#A07048'); cg.addColorStop(1, '#6B4020');
    cx.fillStyle = cg; cx.fillRect(0, cy, W, CTR_H);
    cx.fillStyle = '#4A2808'; cx.fillRect(0, cy, W, 7);
    cx.fillStyle = 'rgba(255,255,255,.15)'; cx.fillRect(0, cy + 7, W, 4);
    const items = ['🍳','🥘','🍲','☕','🥄','🍴','🧂'];
    const esz = Math.min(CTR_H * 0.65, 44);
    cx.font = `${esz}px serif`; cx.textBaseline = 'middle'; cx.textAlign = 'center';
    items.forEach((it, i) => cx.fillText(it, (W / (items.length + 1)) * (i + 1), cy + CTR_H / 2));

    /* side accents */
    cx.fillStyle = '#DDDDE4'; cx.fillRect(0, CAB_H, 18, FLOOR_Y - CAB_H);
    cx.fillStyle = '#DDDDE4'; cx.fillRect(W - 18, CAB_H, 18, FLOOR_Y - CAB_H);
    const hh = (FLOOR_Y - CAB_H - 32) / 2;
    cx.fillStyle = '#CCC';
    cx.fillRect(2, CAB_H + 16, 14, hh - 4);
    cx.fillRect(2, CAB_H + 16 + hh, 14, hh - 4);
  }

  /* ── FOOD ITEMS ON FLOOR ──────────────────────────────── */
  _drawFoods() {
    for (const f of this.foods) {
      if (f.alpha <= 0) continue;
      cx.save();
      cx.globalAlpha = f.alpha;

      const fx = f.x;
      const fy = this.FLOOR_Y - 4;  /* sit on floor */

      /* shadow */
      cx.fillStyle = 'rgba(0,0,0,0.18)';
      cx.beginPath();
      cx.ellipse(fx, fy + 2, 26, 8, 0, 0, Math.PI * 2);
      cx.fill();

      /* timer arc — green → orange → red */
      const lifePct = Math.max(0, f.life / 300);
      const arcColor = lifePct > 0.5 ? '#4CAF50' : lifePct > 0.25 ? '#FF9800' : '#F44336';
      cx.strokeStyle = arcColor;
      cx.lineWidth   = 5;
      cx.lineCap     = 'butt';
      cx.beginPath();
      cx.arc(fx, fy - 26, 28, -Math.PI / 2, -Math.PI / 2 + lifePct * Math.PI * 2);
      cx.stroke();

      /* emoji */
      cx.font = '40px serif';
      cx.textAlign   = 'center';
      cx.textBaseline = 'bottom';
      cx.fillText(f.emoji, fx, fy);

      /* point badge */
      cx.fillStyle = '#FFD700';
      cx.strokeStyle = '#B8860B';
      cx.lineWidth = 2;
      cx.font = 'bold 13px "Comic Sans MS", cursive';
      cx.textBaseline = 'bottom';
      cx.strokeText(`+${f.pts}`, fx, fy - 58);
      cx.fillText(`+${f.pts}`, fx, fy - 58);

      cx.restore();
    }
  }

  /* ── FLOATING SCORE TEXTS ─────────────────────────────── */
  _drawFloats() {
    for (const ft of this.floats) {
      cx.save();
      cx.globalAlpha = ft.alpha;
      cx.font = `bold ${ft.size}px "Comic Sans MS", cursive`;
      cx.textAlign   = 'center';
      cx.textBaseline = 'middle';
      /* white outline */
      cx.strokeStyle = 'rgba(255,255,255,0.9)';
      cx.lineWidth   = 5;
      cx.strokeText(ft.text, ft.x, ft.y);
      cx.fillStyle = ft.color;
      cx.fillText(ft.text, ft.x, ft.y);
      cx.restore();
    }
  }

  /* ── CHARACTER ────────────────────────────────────────── */
  _drawPlayer(p) {
    const FLOOR_Y = this.FLOOR_Y;
    const fx = p.x;

    /* walk animation */
    const swing = p.moving ? Math.sin(p.walkPhase) : 0;
    const bob   = p.moving ? Math.abs(Math.sin(p.walkPhase)) * 5 : 0;

    const baseY  = FLOOR_Y - bob;        /* floor contact point, lifts when walking */
    const hipY   = baseY - BODY_BOT - 8; /* where legs join body */

    /* ── shoes ── */
    const lFootX = fx - 18 + swing * 22;
    const rFootX = fx + 18 - swing * 22;
    cx.fillStyle = '#222';
    cx.beginPath(); cx.ellipse(lFootX, baseY - 2, 19, 8, swing * 0.2, 0, Math.PI * 2); cx.fill();
    cx.beginPath(); cx.ellipse(rFootX, baseY - 2, 19, 8, -swing * 0.2, 0, Math.PI * 2); cx.fill();

    /* ── legs (drawn as thick lines) ── */
    const legColor = p.isGirl ? '#CC2266' : '#1848B0';
    cx.strokeStyle = legColor; cx.lineWidth = 20; cx.lineCap = 'round';
    cx.beginPath(); cx.moveTo(fx - 12, hipY); cx.lineTo(lFootX, baseY - 6); cx.stroke();
    cx.beginPath(); cx.moveTo(fx + 12, hipY); cx.lineTo(rFootX, baseY - 6); cx.stroke();

    /* ── torso ── */
    const torsoTop = baseY - BODY_TOP;
    const torsoH   = BODY_TOP - BODY_BOT;
    const shirt1 = p.isGirl ? '#FF75B0' : '#4A8FEC';
    const shirt2 = p.isGirl ? '#E0207A' : '#1848B0';
    const tg = cx.createLinearGradient(fx - 36, torsoTop, fx + 36, baseY - BODY_BOT);
    tg.addColorStop(0, shirt1); tg.addColorStop(1, shirt2);
    cx.fillStyle = tg;
    cx.beginPath(); cx.roundRect(fx - 36, torsoTop, 72, torsoH, 10); cx.fill();

    /* ── arms ── */
    const armShoulderY = torsoTop + 18;
    const armTipY      = baseY - ARM_Y;
    cx.strokeStyle = shirt1; cx.lineWidth = 16; cx.lineCap = 'round';
    cx.beginPath(); cx.moveTo(fx - 32, armShoulderY); cx.lineTo(fx - 62, armTipY); cx.stroke();
    cx.beginPath(); cx.moveTo(fx + 32, armShoulderY); cx.lineTo(fx + 62, armTipY); cx.stroke();
    /* hands */
    cx.fillStyle = '#FFD0A0';
    cx.beginPath(); cx.arc(fx - 62, armTipY, 11, 0, Math.PI * 2); cx.fill();
    cx.beginPath(); cx.arc(fx + 62, armTipY, 11, 0, Math.PI * 2); cx.fill();

    /* ── neck ── */
    cx.fillStyle = '#FFD0A0';
    cx.fillRect(fx - 9, torsoTop - 10, 18, 14);

    /* ── head (square-ish) ── */
    const hcx = fx;
    const hcy = torsoTop - HEAD_R - 6;
    cx.fillStyle = p.isGirl ? '#FFDCB4' : '#FFE0B0';
    cx.beginPath(); cx.roundRect(hcx - HEAD_R, hcy - HEAD_R, HEAD_R * 2, HEAD_R * 2 + 4, 16); cx.fill();

    /* ── hair ── */
    if (p.isGirl) {
      /* Helcia — chestnut, side waves */
      cx.fillStyle = '#9B5020';
      cx.beginPath(); cx.ellipse(hcx, hcy + 4, HEAD_R + 10, HEAD_R + 12, 0, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.roundRect(hcx - HEAD_R - 4, hcy - HEAD_R - 10, (HEAD_R + 4) * 2, HEAD_R * 0.75, 18); cx.fill();
      /* face re-overlay */
      cx.fillStyle = '#FFDCB4';
      cx.beginPath(); cx.roundRect(hcx - HEAD_R, hcy - HEAD_R, HEAD_R * 2, HEAD_R * 2 + 4, 16); cx.fill();
      /* fringe */
      cx.fillStyle = '#9B5020';
      for (let fi = -1; fi <= 1; fi++) {
        cx.beginPath(); cx.ellipse(hcx + fi * 13, hcy - HEAD_R + 5, 8, 12, fi * 0.15, 0, Math.PI * 2); cx.fill();
      }
    } else {
      /* Tadzio — golden mushroom cut */
      cx.fillStyle = '#D4B030';
      cx.beginPath(); cx.arc(hcx, hcy - 2, HEAD_R + 9, Math.PI, 0); cx.fill();
      cx.fillRect(hcx - HEAD_R - 8, hcy - HEAD_R + 8, (HEAD_R + 8) * 2, HEAD_R * 0.55);
      /* ear flaps */
      cx.beginPath(); cx.ellipse(hcx - HEAD_R - 3, hcy + 5, 9, 18, 0, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.ellipse(hcx + HEAD_R + 3, hcy + 5, 9, 18, 0, 0, Math.PI * 2); cx.fill();
      /* face re-overlay */
      cx.fillStyle = '#FFE0B0';
      cx.beginPath(); cx.roundRect(hcx - HEAD_R, hcy - HEAD_R, HEAD_R * 2, HEAD_R * 2 + 4, 16); cx.fill();
    }

    /* ── ears ── */
    const skinColor = p.isGirl ? '#FFDCB4' : '#FFE0B0';
    cx.fillStyle = skinColor;
    cx.beginPath(); cx.ellipse(hcx - HEAD_R,     hcy + 4, 7, 10, 0, 0, Math.PI * 2); cx.fill();
    cx.beginPath(); cx.ellipse(hcx + HEAD_R,     hcy + 4, 7, 10, 0, 0, Math.PI * 2); cx.fill();

    /* ── eyebrows ── */
    cx.strokeStyle = p.isGirl ? '#7B3A10' : '#8B6A10';
    cx.lineWidth = 3; cx.lineCap = 'round';
    cx.beginPath(); cx.moveTo(hcx - 24, hcy - 10); cx.quadraticCurveTo(hcx - 12, hcy - 16, hcx - 2, hcy - 11); cx.stroke();
    cx.beginPath(); cx.moveTo(hcx + 2,  hcy - 11); cx.quadraticCurveTo(hcx + 12, hcy - 16, hcx + 24, hcy - 10); cx.stroke();

    /* ── eyes ── */
    cx.fillStyle = '#fff';
    cx.beginPath(); cx.ellipse(hcx - 11, hcy - 1, 9, 11, 0, 0, Math.PI * 2); cx.fill();
    cx.beginPath(); cx.ellipse(hcx + 11, hcy - 1, 9, 11, 0, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = p.isGirl ? '#6B3510' : '#2A5CC8';
    cx.beginPath(); cx.ellipse(hcx - 11, hcy,     6,  8, 0, 0, Math.PI * 2); cx.fill();
    cx.beginPath(); cx.ellipse(hcx + 11, hcy,     6,  8, 0, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = '#111';
    cx.beginPath(); cx.ellipse(hcx - 11, hcy + 1, 3,  4, 0, 0, Math.PI * 2); cx.fill();
    cx.beginPath(); cx.ellipse(hcx + 11, hcy + 1, 3,  4, 0, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = '#fff';
    cx.beginPath(); cx.arc(hcx - 8,  hcy - 4, 2.2, 0, Math.PI * 2); cx.fill();
    cx.beginPath(); cx.arc(hcx + 14, hcy - 4, 2.2, 0, Math.PI * 2); cx.fill();

    /* ── nose ── */
    cx.fillStyle = '#EDAC80';
    cx.beginPath(); cx.ellipse(hcx, hcy + 12, 5, 3.5, 0, 0, Math.PI * 2); cx.fill();

    /* ── cheeks ── */
    cx.fillStyle = p.isGirl ? 'rgba(255,100,150,0.45)' : 'rgba(255,140,100,0.32)';
    cx.beginPath(); cx.ellipse(hcx - 19, hcy + 13, 11, 8, 0, 0, Math.PI * 2); cx.fill();
    cx.beginPath(); cx.ellipse(hcx + 19, hcy + 13, 11, 8, 0, 0, Math.PI * 2); cx.fill();

    /* ── mouth ── */
    if (p.isGirl) {
      cx.strokeStyle = '#B03030'; cx.lineWidth = 2.5; cx.lineCap = 'round';
      cx.beginPath(); cx.arc(hcx, hcy + 21, 11, 0.1, Math.PI - 0.1); cx.stroke();
      cx.fillStyle = '#fff';
      cx.beginPath(); cx.arc(hcx, hcy + 21, 11, 0.1, Math.PI - 0.1); cx.fill();
    } else {
      cx.strokeStyle = '#B03030'; cx.lineWidth = 2.5; cx.lineCap = 'round';
      cx.beginPath(); cx.arc(hcx, hcy + 21, 9, 0.2, Math.PI - 0.2); cx.stroke();
    }

    /* ── name label ── */
    const tagY = FLOOR_Y - CHAR_H - 10 - bob;
    cx.font = "bold 17px 'Comic Sans MS', cursive";
    cx.textAlign = 'center'; cx.textBaseline = 'bottom';
    cx.strokeStyle = 'rgba(255,255,255,0.95)'; cx.lineWidth = 4;
    cx.strokeText(p.name, fx, tagY);
    cx.fillStyle = p.color;
    cx.fillText(p.name, fx, tagY);
  }

  /* ── HUD ──────────────────────────────────────────────── */
  _drawHUD() {
    const { W, CAB_H, helcia: h, tadzio: t, timeLeft } = this;
    const bY = CAB_H + 8, bH = 52, bW = 210;

    /* Helcia score */
    cx.fillStyle = 'rgba(220,50,130,0.85)';
    this._rr(8, bY, bW, bH, 10); cx.fill();
    cx.fillStyle = '#fff'; cx.textAlign = 'left'; cx.textBaseline = 'middle';
    cx.font = "bold 16px 'Comic Sans MS', cursive";
    cx.fillText(`👧 Helcia`, 18, bY + bH / 2 - 10);
    cx.font = "bold 22px 'Comic Sans MS', cursive";
    cx.fillText(`${h.score} pkt`, 18, bY + bH / 2 + 12);

    /* Tadzio score */
    cx.fillStyle = 'rgba(40,100,220,0.85)';
    this._rr(W - bW - 8, bY, bW, bH, 10); cx.fill();
    cx.fillStyle = '#fff'; cx.textAlign = 'right';
    cx.font = "bold 16px 'Comic Sans MS', cursive";
    cx.fillText(`Tadzio 👦`, W - 18, bY + bH / 2 - 10);
    cx.font = "bold 22px 'Comic Sans MS', cursive";
    cx.fillText(`${t.score} pkt`, W - 18, bY + bH / 2 + 12);

    /* timer */
    const ticking = timeLeft <= 10;
    cx.fillStyle = ticking ? 'rgba(200,30,0,0.85)' : 'rgba(0,0,0,0.65)';
    this._rr(W / 2 - 65, bY, 130, bH, 10); cx.fill();
    cx.fillStyle = '#fff';
    cx.font = `bold ${ticking ? 30 : 22}px 'Comic Sans MS', cursive`;
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.fillText(`⏱ ${timeLeft}s`, W / 2, bY + bH / 2);

    /* controls hint at bottom of cabinet area */
    cx.font = '12px Arial, sans-serif';
    cx.fillStyle = 'rgba(80,40,0,.65)';
    cx.textAlign = 'left';  cx.textBaseline = 'bottom';
    cx.fillText('A / D — Helcia', 10, CAB_H - 4);
    cx.textAlign = 'right';
    cx.fillText('Tadzio — ◄ ►', W - 10, CAB_H - 4);
  }

  /* ── UTILS ────────────────────────────────────────────── */
  _rr(x, y, w, h, r) {
    cx.beginPath();
    cx.moveTo(x + r, y);
    cx.lineTo(x + w - r, y); cx.arcTo(x + w, y,     x + w, y + r,     r);
    cx.lineTo(x + w, y + h - r); cx.arcTo(x + w, y + h, x + w - r, y + h, r);
    cx.lineTo(x + r, y + h); cx.arcTo(x,     y + h, x,     y + h - r, r);
    cx.lineTo(x, y + r); cx.arcTo(x,     y,     x + r,     y,         r);
    cx.closePath();
  }
}

/* ─── WIRING ──────────────────────────────────────────── */
let currentGame = null;

function startGame() {
  music.start();
  showScreen('game-screen');
  if (currentGame) currentGame.destroy();
  currentGame = new Game();
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('playAgainBtn').addEventListener('click', startGame);
</script>
</body>
