<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helcia i Tadzio – Gra Kuchenna!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  background: #000;
}

.screen {
  position: absolute; inset: 0;
  display: none;
}
.screen.active { display: flex; }

/* ─── LANDING ─────────────────────────────────────────── */
#landing {
  flex-direction: column;
  align-items: stretch;
  /* kitchen wall tiles */
  background-color: #FFF5E0;
  background-image:
    linear-gradient(45deg, #E8D5A3 25%, transparent 25%),
    linear-gradient(-45deg, #E8D5A3 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #E8D5A3 75%),
    linear-gradient(-45deg, transparent 75%, #E8D5A3 75%);
  background-size: 80px 80px;
  background-position: 0 0, 0 40px, 40px -40px, -40px 0px;
}

/* top cabinet row */
.cabinet-top {
  width: 100%; height: clamp(90px, 13vh, 140px);
  background: linear-gradient(180deg, #5A3010 0%, #7B4A25 60%, #9B6B4A 100%);
  display: flex; align-items: center; padding: 10px 16px; gap: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  flex-shrink: 0; overflow: hidden;
}
.cab-door {
  flex: 1; height: 80%; max-width: 160px;
  background: linear-gradient(135deg, #A87550 0%, #7A5030 50%, #A87550 100%);
  border-radius: 7px; border: 3px solid #4A2808;
  position: relative;
  box-shadow: inset 0 2px 5px rgba(255,255,255,0.2), inset 0 -2px 5px rgba(0,0,0,0.25);
}
.cab-door::after {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 36px; height: 10px;
  background: linear-gradient(180deg, #D4A060 0%, #A07030 100%);
  border-radius: 5px; border: 1.5px solid #6B4820;
}

/* middle content */
.landing-mid {
  flex: 1; display: flex;
  align-items: center; justify-content: space-around;
  padding: 10px 5vw;
  overflow: hidden;
}

.char-col {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
}
.char-col svg {
  filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.3));
  animation: bob 3s ease-in-out infinite;
}
.char-col:nth-child(3) svg { animation-delay: -1.5s; }
@keyframes bob {
  0%,100% { transform: translateY(0px) rotate(-1deg); }
  50%      { transform: translateY(-12px) rotate(1deg); }
}
.char-name {
  font-size: clamp(22px, 3vw, 38px);
  font-weight: 900; color: #5A3010;
  text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
}
.controls-tag {
  font-size: clamp(13px, 1.6vw, 20px);
  background: rgba(255,255,255,0.75);
  padding: 4px 14px; border-radius: 20px; color: #6B4020;
}

/* title block */
.title-block {
  text-align: center; display: flex; flex-direction: column;
  align-items: center; gap: clamp(10px, 2vh, 24px);
}
.game-title {
  font-size: clamp(36px, 7vw, 96px);
  font-weight: 900; line-height: 1.05;
  color: #8B2000;
  text-shadow:
    4px 4px 0 #FF8C00,
    8px 8px 0 rgba(0,0,0,0.18);
}
.game-sub {
  font-size: clamp(16px, 2.2vw, 28px);
  color: #7B4820;
  background: rgba(255,255,255,0.75);
  padding: 8px 24px; border-radius: 24px;
}
.start-btn {
  font-size: clamp(22px, 3vw, 42px);
  font-weight: 900;
  font-family: inherit;
  background: linear-gradient(180deg, #FF7035 0%, #E63000 100%);
  color: #fff;
  border: 4px solid #B02000;
  border-radius: 60px;
  padding: clamp(12px,2vh,20px) clamp(30px,5vw,70px);
  cursor: pointer;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  box-shadow: 0 7px 0 #B02000, 0 9px 18px rgba(0,0,0,0.3);
  transition: transform .1s, box-shadow .1s;
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.06); }
}
.start-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 0 #B02000, 0 12px 22px rgba(0,0,0,0.3); }
.start-btn:active { transform: translateY(5px);  box-shadow: 0 2px 0  #B02000, 0 4px 10px rgba(0,0,0,0.2); animation: none; }

/* bottom counter */
.counter-bottom {
  width: 100%; height: clamp(60px, 9vh, 100px);
  background: linear-gradient(180deg, #9B6B4A 0%, #7A4A28 100%);
  border-top: 6px solid #4A2808;
  display: flex; align-items: center; justify-content: space-evenly;
  padding: 0 20px; flex-shrink: 0;
}
.counter-bottom span { font-size: clamp(28px, 4vw, 50px); }

/* ─── GAME SCREEN ─────────────────────────────────────── */
#game-screen {
  background: #000;
}
#gameCanvas {
  display: block;
  width: 100%; height: 100%;
}

/* ─── RESULT SCREEN ───────────────────────────────────── */
#result-screen {
  flex-direction: column; align-items: center; justify-content: center;
  gap: 28px;
  background: radial-gradient(ellipse at center, rgba(80,30,0,0.92) 0%, rgba(20,10,0,0.97) 100%);
}
.result-winner {
  font-size: clamp(40px, 8vw, 90px);
  font-weight: 900; color: #FFD700;
  text-shadow: 3px 3px 0 #FF8C00, 6px 6px 20px rgba(255,200,0,0.5);
  text-align: center;
}
.result-scores {
  font-size: clamp(22px, 3.5vw, 42px);
  color: #FFF8E0;
  text-align: center; line-height: 1.9;
}
.play-again-btn {
  font-size: clamp(20px, 2.8vw, 36px);
  font-weight: 900; font-family: inherit;
  background: linear-gradient(180deg, #4CD964 0%, #228B22 100%);
  color: #fff; border: 4px solid #145214;
  border-radius: 60px;
  padding: 14px 55px; cursor: pointer;
  box-shadow: 0 7px 0 #145214;
  text-shadow: 1px 2px 0 rgba(0,0,0,0.3);
}
.play-again-btn:hover { transform: translateY(-2px); }
.play-again-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 #145214; }
</style>
</head>

<script>
'use strict';

/* ─── CABINET DOORS (landing) ─────────────────────────── */
(function () {
  const el = document.getElementById('cabTop');
  const n  = Math.ceil(window.innerWidth / 174) + 1;
  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'cab-door';
    el.appendChild(d);
  }
})();

/* ─── SCREEN HELPER ───────────────────────────────────── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ─── MUSIC ───────────────────────────────────────────── */
class Music {
  constructor() {
    this.ctx    = null;
    this.active = false;
    this._timer = null;
    const R=0, C4=261.63, D4=293.66, E4=329.63, G4=392, A4=440, B4=493.88,
          Bb4=466.16, C5=523.25, D5=587.33, E5=659.25,
          F5=698.46,  G5=784,    A5=880;
    this.melody   = [
      [E5,.18],[E5,.18],[R,.10],[E5,.18],[R,.10],[C5,.18],[E5,.36],[G5,.36],[G4,.36],
      [C5,.27],[G4,.18],[R,.18],[E4,.27],[A4,.18],[B4,.18],[Bb4,.18],[A4,.36],
      [G4,.24],[E5,.24],[G5,.24],[A5,.36],[F5,.18],[G5,.18],[R,.18],[E5,.36],[C5,.18],[D5,.18],[B4,.36],
      [C5,.27],[G4,.18],[R,.18],[E4,.27],[A4,.18],[B4,.18],[Bb4,.18],[A4,.36],
      [G4,.24],[E5,.24],[G5,.24],[A5,.36],[F5,.18],[G5,.18],[R,.18],[E5,.36],[C5,.18],[D5,.18],[B4,.36],
    ];
    this.totalDur = this.melody.reduce((s,[,d]) => s+d, 0);
  }
  start() {
    if (this.ctx) return;
    this.ctx   = new (window.AudioContext || window.webkitAudioContext)();
    this.active = true;
    this._sched(this.ctx.currentTime + 0.05);
  }
  _sched(t0) {
    if (!this.active) return;
    let t = t0;
    for (const [f, d] of this.melody) {
      if (f) { this._n(f, t, d*.88, 'square', .07); this._n(f/2, t, d*.45, 'triangle', .04); }
      t += d;
    }
    const wait = Math.max(0, (t0+this.totalDur - this.ctx.currentTime - .6)*1000);
    this._timer = setTimeout(() => this._sched(t0+this.totalDur), wait);
  }
  _n(freq, t, dur, type, vol) {
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.connect(g); g.connect(this.ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.start(t); o.stop(t+dur+.02);
  }
  sfx(notes) {   /* [{f, t, d}] */
    if (!this.ctx) return;
    notes.forEach(({f, t, d}) => this._n(f, this.ctx.currentTime+t, d, 'square', 0.18));
  }
}
const music = new Music();

/* ─── FOOD CATALOGUE ──────────────────────────────────── */
const FOODS = [
  {e:'🍎',pts:10},{e:'🥕',pts:5},{e:'🥔',pts:5},{e:'🍅',pts:10},
  {e:'🥦',pts:15},{e:'🧅',pts:3},{e:'🍋',pts:8},{e:'🥒',pts:7},
  {e:'🍄',pts:12},{e:'🍓',pts:15},{e:'🫐',pts:20},{e:'🍇',pts:18},
  {e:'🧁',pts:25},{e:'🍕',pts:30},{e:'🧀',pts:12},
];

/* ─── CANVAS ──────────────────────────────────────────── */
const canvas = document.getElementById('gameCanvas');
const cx     = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* ─── GAME ────────────────────────────────────────────── */
/*
  Kitchen viewed from above at a slight angle:
  ┌───────────────────────────────────────────┐  ← back wall (cabinets)
  │  depth ledge (top of counter visible)     │
  ├──┬──────────────────────────────────────┬─┤
  │L │                                      │R│  ← side counter strips
  │  │    F L O O R   (play area)          │ │
  │  │    food items & characters here     │ │
  │  │                                      │ │
  ├──┴──────────────────────────────────────┴─┤
  │  bottom counter + HUD                     │
  └───────────────────────────────────────────┘
*/
const CHAR_R = 18;   /* collision radius */
const CHAR_VH = 46;  /* visual height — play area >= 10× this */

class Game {
  constructor() {
    this._resize();

    this.helcia = {
      name:'Helcia', x: this.px1 + this.pw*0.18, y: this.py1 + this.ph*0.5,
      vx:0, vy:0, speed:3.2, score:0,
      color:'#E0458A', isGirl:true,
      walkPhase:0, moving:false, facing:1,
    };
    this.tadzio = {
      name:'Tadzio', x: this.px1 + this.pw*0.82, y: this.py1 + this.ph*0.5,
      vx:0, vy:0, speed:3.2, score:0,
      color:'#3A6FD8', isGirl:false,
      walkPhase:0, moving:false, facing:-1,
    };

    this.foods   = [];
    this.floats  = [];
    this.frame   = 0;
    this.timeLeft = 60;
    this.running  = true;
    this.keys     = {};

    const GK = new Set(['w','W','a','A','s','S','d','D',
                        'ArrowUp','ArrowDown','ArrowLeft','ArrowRight']);
    this._onKey = (e) => { if (GK.has(e.key)) e.preventDefault(); this.keys[e.key] = (e.type==='keydown'); };
    window.addEventListener('keydown', this._onKey);
    window.addEventListener('keyup',   this._onKey);

    requestAnimationFrame(() => this._loop());
  }

  _resize() {
    const W = canvas.width, H = canvas.height;
    this.W   = W; this.H = H;
    /* wall/border sizes */
    this.bkH = Math.max(70, Math.floor(H * 0.13));  /* back wall height */
    this.sW  = 52;                                    /* side wall width */
    this.btH = Math.max(55, Math.floor(H * 0.09));   /* bottom counter height */
    /* play area */
    this.px1 = this.sW;
    this.py1 = this.bkH;
    this.px2 = W - this.sW;
    this.py2 = H - this.btH;
    this.pw  = this.px2 - this.px1;
    this.ph  = this.py2 - this.py1;
  }

  destroy() {
    this.running = false;
    window.removeEventListener('keydown', this._onKey);
    window.removeEventListener('keyup',   this._onKey);
  }

  _loop() {
    if (!this.running) return;
    this._resize();
    this._update();
    this._draw();
    requestAnimationFrame(() => this._loop());
  }

  /* ── UPDATE ── */
  _update() {
    this.frame++;

    /* timer */
    if (this.frame % 60 === 0) {
      this.timeLeft = Math.max(0, this.timeLeft-1);
      if (this.timeLeft === 0) { this._end(); return; }
    }

    /* move */
    this._move(this.helcia,
      this.keys['a']||this.keys['A'], this.keys['d']||this.keys['D'],
      this.keys['w']||this.keys['W'], this.keys['s']||this.keys['S']);
    this._move(this.tadzio,
      this.keys['ArrowLeft'], this.keys['ArrowRight'],
      this.keys['ArrowUp'],   this.keys['ArrowDown']);

    /* spawn food every ~2.2 s (faster over time) */
    const rate = Math.max(70, 130 - Math.floor((60-this.timeLeft)/8)*8);
    if (this.frame % rate === 0 && this.foods.length < 7) this._spawn();

    /* food pickup */
    const PR = CHAR_R + 22;
    for (const f of this.foods) {
      if (f.dying) { f.alpha = Math.max(0, f.alpha - 0.1); continue; }
      if (f.alpha < 1) f.alpha = Math.min(1, f.alpha + 0.07);
      f.life--;

      /* who is close enough? */
      let winner = null, best = PR;
      for (const p of [this.helcia, this.tadzio]) {
        const d = Math.hypot(p.x - f.x, p.y - f.y);
        if (d < best) { best = d; winner = p; }
      }
      if (winner) {
        f.dying = true;
        winner.score += f.pts;
        this._jingle(f.pts);
        this.floats.push({
          text:`+${f.pts}`, x:f.x, y:f.y-30,
          vy:-1.3, alpha:1, color:winner.color,
          sz: Math.min(34, 22 + f.pts/4),
        });
      }
      if (f.life <= 0) f.dying = true;
    }
    this.foods  = this.foods.filter(f => f.alpha > 0);
    this.floats = this.floats.filter(ft => { ft.y += ft.vy; ft.alpha -= 0.017; return ft.alpha > 0; });
  }

  _move(p, left, right, up, down) {
    let vx = 0, vy = 0;
    if (left)  { vx = -1; p.facing = -1; }
    if (right) { vx =  1; p.facing =  1; }
    if (up)    vy = -1;
    if (down)  vy =  1;
    /* diagonal normalisation */
    if (vx !== 0 && vy !== 0) { vx *= 0.707; vy *= 0.707; }
    p.vx = vx * p.speed;
    p.vy = vy * p.speed;
    p.moving = !!(vx || vy);
    if (p.moving) p.walkPhase += 0.22;
    p.x = Math.max(this.px1 + CHAR_R, Math.min(this.px2 - CHAR_R, p.x + p.vx));
    p.y = Math.max(this.py1 + CHAR_R, Math.min(this.py2 - CHAR_R, p.y + p.vy));
  }

  _spawn() {
    const item = FOODS[Math.floor(Math.random()*FOODS.length)];
    const pad  = 50;
    this.foods.push({
      x: this.px1 + pad + Math.random()*(this.pw - pad*2),
      y: this.py1 + pad + Math.random()*(this.ph - pad*2),
      emoji: item.e, pts: item.pts,
      life: 320, alpha: 0, dying: false,
    });
  }

  _jingle(pts) {
    const b = pts>=20 ? 784 : pts>=12 ? 659 : 523;
    music.sfx([{f:b,t:0,d:0.10},{f:b*1.26,t:0.09,d:0.10},{f:b*1.50,t:0.18,d:0.14}]);
  }

  _end() {
    this.running = false;
    const h = this.helcia, t = this.tadzio;
    const title = h.score>t.score ? '🎉 Helcia wygrywa! 🎉'
                : t.score>h.score ? '🎉 Tadzio wygrywa! 🎉'
                :                   '🤝 Remis! Oboje świetni! 🤝';
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultScores').innerHTML =
      `👧 Helcia: <strong>${h.score}</strong> pkt &nbsp;|&nbsp; Tadzio: <strong>${t.score}</strong> pkt 👦`;
    setTimeout(() => showScreen('result-screen'), 700);
  }

  /* ── DRAW ── */
  _draw() {
    cx.clearRect(0, 0, this.W, this.H);
    this._drawKitchen();
    this._drawFoods();
    /* draw players sorted by Y so the lower one renders on top */
    [this.helcia, this.tadzio]
      .sort((a,b) => a.y - b.y)
      .forEach(p => this._drawChar(p));
    this._drawFloats();
    this._drawHUD();
  }

  /* ── KITCHEN BACKGROUND ── */
  _drawKitchen() {
    const { W, H, bkH, sW, btH, px1, py1, px2, py2, pw, ph } = this;

    /* ── floor tiles ── */
    const tSzFar  = 54;   /* tile size at far end (top of play area) */
    const tSzNear = 72;   /* tile size at near end (bottom of play area) */
    /* We draw a simple rectilinear grid but scale tile size with y for perspective hint */
    const cols = Math.ceil(pw / tSzFar) + 2;
    /* just draw flat tiles with perspective suggested by gradient overlay */
    for (let col = 0; col < cols; col++) {
      for (let row = 0; ; row++) {
        const ty = py1 + row * tSzFar;
        if (ty > py2) break;
        const tx = px1 + col * tSzFar;
        if (tx > px2) break;
        const even = (row + col) % 2 === 0;
        cx.fillStyle = even ? '#F5EDD0' : '#E0D4A8';
        cx.fillRect(Math.max(px1,tx), Math.max(py1,ty),
                    Math.min(tSzFar, px2-tx), Math.min(tSzFar, py2-ty));
        cx.strokeStyle = '#C8B870'; cx.lineWidth = 0.6;
        cx.strokeRect(Math.max(px1,tx), Math.max(py1,ty),
                      Math.min(tSzFar, px2-tx), Math.min(tSzFar, py2-ty));
      }
    }

    /* perspective gradient overlay (darker at top = further away) */
    const pfg = cx.createLinearGradient(0, py1, 0, py2);
    pfg.addColorStop(0,   'rgba(40,20,0,0.22)');
    pfg.addColorStop(0.5, 'rgba(40,20,0,0.06)');
    pfg.addColorStop(1,   'rgba(255,240,200,0.04)');
    cx.fillStyle = pfg;
    cx.fillRect(px1, py1, pw, ph);

    /* floor edge highlight at bottom (nearest to viewer) */
    cx.fillStyle = 'rgba(255,240,180,0.18)';
    cx.fillRect(px1, py2-18, pw, 18);

    /* ── back wall ── */
    /* wall face */
    const wallG = cx.createLinearGradient(0, 0, 0, bkH);
    wallG.addColorStop(0, '#4A2808');
    wallG.addColorStop(0.7, '#7B4A25');
    wallG.addColorStop(1,   '#9B6B4A');
    cx.fillStyle = wallG;
    cx.fillRect(0, 0, W, bkH);

    /* cabinet doors on back wall */
    const dW = Math.min(150, W / 7), gap = 14, tot = dW + gap;
    const sx = (W % tot) / 2;
    for (let i = 0; i < Math.ceil(W/tot)+1; i++) {
      const dx = sx + i*tot - gap/2, dy = 7, dh = bkH - 20;
      const dg = cx.createLinearGradient(dx, dy, dx, dy+dh);
      dg.addColorStop(0, '#C08050'); dg.addColorStop(.4, '#9B6B40'); dg.addColorStop(1, '#7A4828');
      cx.fillStyle = dg; this._rr(dx, dy, dW, dh, 5); cx.fill();
      cx.strokeStyle = '#3A1A05'; cx.lineWidth = 2;
      this._rr(dx, dy, dW, dh, 5); cx.stroke();
      cx.strokeStyle = 'rgba(255,255,255,.15)'; cx.lineWidth = 1;
      this._rr(dx+5, dy+5, dW-10, dh-10, 4); cx.stroke();
      /* handle */
      cx.fillStyle = '#D4A050';
      this._rr(dx+dW/2-16, dy+dh/2-5, 32, 10, 5); cx.fill();
      cx.strokeStyle = '#8B5820'; cx.lineWidth = 1.5; cx.stroke();
    }

    /* depth ledge — top surface of back counter (perspective angle cue) */
    const ledgeH = 14;
    const ledgeG = cx.createLinearGradient(0, bkH, 0, bkH+ledgeH);
    ledgeG.addColorStop(0, '#C09060');
    ledgeG.addColorStop(1, '#7A5030');
    cx.fillStyle = ledgeG;
    cx.fillRect(0, bkH, W, ledgeH);
    cx.fillStyle = 'rgba(255,255,255,0.2)';
    cx.fillRect(0, bkH, W, 3);
    cx.fillStyle = 'rgba(0,0,0,0.25)';
    cx.fillRect(0, bkH+ledgeH-3, W, 3);

    /* ── side counters ── */
    for (const sx2 of [0, px2]) {
      const cg = cx.createLinearGradient(sx2, 0, sx2+sW, 0);
      if (sx2 === 0) { cg.addColorStop(0,'#4A2808'); cg.addColorStop(1,'#8B5830'); }
      else           { cg.addColorStop(0,'#8B5830'); cg.addColorStop(1,'#4A2808'); }
      cx.fillStyle = cg;
      cx.fillRect(sx2, bkH+ledgeH, sW, py2 - bkH - ledgeH);
      /* depth edge (top surface of side counter) */
      const eW = 12;
      const eg = cx.createLinearGradient(sx2 === 0 ? sx2+sW-eW : sx2, 0,
                                         sx2 === 0 ? sx2+sW     : sx2+eW, 0);
      eg.addColorStop(0, sx2===0?'#A07040':'#7A5030');
      eg.addColorStop(1, sx2===0?'#7A5030':'#A07040');
      cx.fillStyle = eg;
      cx.fillRect(sx2===0 ? sx2+sW-eW : sx2, bkH+ledgeH, eW, py2-bkH-ledgeH);
    }

    /* ── bottom counter ── */
    const bcG = cx.createLinearGradient(0, py2, 0, H);
    bcG.addColorStop(0, '#A07048'); bcG.addColorStop(1, '#6B4020');
    cx.fillStyle = bcG; cx.fillRect(0, py2, W, btH);
    cx.fillStyle = '#4A2808'; cx.fillRect(0, py2, W, 6);
    cx.fillStyle = 'rgba(255,255,255,.15)'; cx.fillRect(0, py2+6, W, 3);

    /* counter items */
    const ctItems = ['🍳','🥘','🍲','☕','🥄','🍴','🧂'];
    const esz = Math.min(btH*0.58, 38);
    cx.font = `${esz}px serif`; cx.textBaseline='middle'; cx.textAlign='center';
    ctItems.forEach((it,i) => cx.fillText(it, (W/(ctItems.length+1))*(i+1), py2+btH/2));

    /* corner decorations */
    /* stove top-left */
    cx.fillStyle = '#555';
    this._rr(px1+8, py1+bkH*0.05+ledgeH, 80, 70, 6); cx.fill();
    cx.fillStyle = '#444'; this._rr(px1+13, py1+bkH*0.05+ledgeH+5, 70, 60, 4); cx.fill();
    ['#777','#777','#777','#777'].forEach((_,i) => {
      cx.fillStyle = '#888';
      cx.beginPath(); cx.arc(px1+28+((i%2)*34), py1+ledgeH+18+Math.floor(i/2)*30, 10, 0, Math.PI*2); cx.fill();
      cx.fillStyle = '#555'; cx.beginPath(); cx.arc(px1+28+((i%2)*34), py1+ledgeH+18+Math.floor(i/2)*30, 6, 0, Math.PI*2); cx.fill();
    });

    /* fridge top-right */
    cx.fillStyle = '#DDDDE4';
    cx.fillRect(px2-78, py1+ledgeH, 70, 90);
    cx.fillStyle = '#CCC';
    cx.fillRect(px2-74, py1+ledgeH+8, 62, 38);
    cx.fillRect(px2-74, py1+ledgeH+50, 62, 34);
    cx.fillStyle = '#999';
    cx.beginPath(); cx.arc(px2-18, py1+ledgeH+28, 4, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(px2-18, py1+ledgeH+68, 4, 0, Math.PI*2); cx.fill();
  }

  /* ── FOOD ITEMS ── */
  _drawFoods() {
    for (const f of this.foods) {
      if (f.alpha <= 0) continue;
      cx.save(); cx.globalAlpha = f.alpha;

      /* shadow */
      cx.fillStyle = 'rgba(0,0,0,0.18)';
      cx.beginPath(); cx.ellipse(f.x, f.y+18, 20, 7, 0, 0, Math.PI*2); cx.fill();

      /* timer arc */
      const pct = Math.max(0, f.life/320);
      cx.strokeStyle = pct>.5?'#4CAF50':pct>.25?'#FF9800':'#F44336';
      cx.lineWidth = 4; cx.lineCap = 'butt';
      cx.beginPath();
      cx.arc(f.x, f.y, 24, -Math.PI/2, -Math.PI/2 + pct*Math.PI*2);
      cx.stroke();

      /* emoji */
      cx.font = '32px serif';
      cx.textAlign='center'; cx.textBaseline='middle';
      cx.fillText(f.emoji, f.x, f.y+2);

      /* point badge */
      cx.font = 'bold 12px "Comic Sans MS",cursive';
      cx.fillStyle = '#FFD700'; cx.strokeStyle = '#8B6000'; cx.lineWidth = 2;
      cx.textBaseline = 'bottom';
      cx.strokeText(`+${f.pts}`, f.x, f.y-26);
      cx.fillText(`+${f.pts}`, f.x, f.y-26);

      cx.restore();
    }
  }

  /* ── FLOATING TEXTS ── */
  _drawFloats() {
    for (const ft of this.floats) {
      cx.save(); cx.globalAlpha = ft.alpha;
      cx.font = `bold ${ft.sz}px "Comic Sans MS",cursive`;
      cx.textAlign='center'; cx.textBaseline='middle';
      cx.strokeStyle='rgba(255,255,255,0.9)'; cx.lineWidth=5;
      cx.strokeText(ft.text, ft.x, ft.y);
      cx.fillStyle = ft.color;
      cx.fillText(ft.text, ft.x, ft.y);
      cx.restore();
    }
  }

  /* ── CHARACTER SPRITE (small top-down 3/4 view) ── */
  _drawChar(p) {
    const { x, y } = p;
    /* sizes */
    const HR  = 14;   /* head radius */
    const BW  = 20;   /* body half-width */
    const BH  = 22;   /* body height */
    const LS  = 8;    /* leg half-separation */
    const LH  = 14;   /* leg length */
    const ARM = 18;   /* arm length */

    const swing = p.moving ? Math.sin(p.walkPhase)*10 : 0;
    const bob   = p.moving ? Math.abs(Math.sin(p.walkPhase))*2 : 0;

    /* shadow on floor */
    cx.fillStyle = 'rgba(0,0,0,0.22)';
    cx.beginPath(); cx.ellipse(x, y+LH+3, BW*0.9, 6, 0, 0, Math.PI*2); cx.fill();

    /* legs */
    const legCol = p.isGirl ? '#CC2266' : '#1848B0';
    cx.strokeStyle = legCol; cx.lineWidth = 9; cx.lineCap = 'round';
    cx.beginPath(); cx.moveTo(x-LS, y+BH/2-bob); cx.lineTo(x-LS+swing*0.4, y+BH/2+LH-bob); cx.stroke();
    cx.beginPath(); cx.moveTo(x+LS, y+BH/2-bob); cx.lineTo(x+LS-swing*0.4, y+BH/2+LH-bob); cx.stroke();

    /* shoes */
    cx.fillStyle = '#222';
    cx.beginPath(); cx.ellipse(x-LS+swing*0.4, y+BH/2+LH-bob+3, 9, 5, swing*.04, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.ellipse(x+LS-swing*0.4, y+BH/2+LH-bob+3, 9, 5, -swing*.04, 0, Math.PI*2); cx.fill();

    /* body */
    const bodyG = cx.createLinearGradient(x-BW, y-BH/2-bob, x+BW, y+BH/2-bob);
    bodyG.addColorStop(0, p.isGirl ? '#FF90C0' : '#6AAFFF');
    bodyG.addColorStop(1, p.isGirl ? '#D01870' : '#1040C0');
    cx.fillStyle = bodyG;
    cx.beginPath(); cx.roundRect(x-BW, y-BH/2-bob, BW*2, BH, 7); cx.fill();

    /* arms */
    cx.strokeStyle = p.isGirl ? '#FF90C0' : '#6AAFFF';
    cx.lineWidth = 7; cx.lineCap = 'round';
    cx.beginPath(); cx.moveTo(x-BW, y-BH/4-bob); cx.lineTo(x-BW-ARM+swing, y+2-bob); cx.stroke();
    cx.beginPath(); cx.moveTo(x+BW, y-BH/4-bob); cx.lineTo(x+BW+ARM-swing, y+2-bob); cx.stroke();
    /* hands */
    cx.fillStyle = '#FFD0A0';
    cx.beginPath(); cx.arc(x-BW-ARM+swing, y+2-bob, 5, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(x+BW+ARM-swing, y+2-bob, 5, 0, Math.PI*2); cx.fill();

    /* neck */
    cx.fillStyle = '#FFD0A0';
    cx.fillRect(x-5, y-BH/2-HR*0.4-bob, 10, HR*0.6);

    /* head */
    const skinCol = p.isGirl ? '#FFDCB4' : '#FFE0B0';
    cx.fillStyle = skinCol;
    cx.beginPath(); cx.roundRect(x-HR, y-BH/2-HR*2-bob, HR*2, HR*2+3, 10); cx.fill();

    /* hair */
    if (p.isGirl) {
      /* chestnut — top arc + side wisps */
      cx.fillStyle = '#9B5020';
      cx.beginPath(); cx.arc(x, y-BH/2-HR*1.6-bob, HR+4, Math.PI, 0); cx.fill();
      /* re-draw face area */
      cx.fillStyle = skinCol;
      cx.beginPath(); cx.roundRect(x-HR, y-BH/2-HR*2-bob, HR*2, HR*2+3, 10); cx.fill();
      /* side strands */
      cx.fillStyle = '#9B5020';
      cx.beginPath(); cx.ellipse(x-HR-2, y-BH/2-HR*1.1-bob, 4, 9, 0, 0, Math.PI*2); cx.fill();
      cx.beginPath(); cx.ellipse(x+HR+2, y-BH/2-HR*1.1-bob, 4, 9, 0, 0, Math.PI*2); cx.fill();
    } else {
      /* golden mushroom cap */
      cx.fillStyle = '#D4B030';
      cx.beginPath(); cx.arc(x, y-BH/2-HR*1.7-bob, HR+5, Math.PI, 0); cx.fill();
      /* flat fringe */
      cx.fillRect(x-HR-5, y-BH/2-HR*2-bob+2, (HR+5)*2, HR*0.6);
      /* ear flaps */
      cx.beginPath(); cx.ellipse(x-HR-3, y-BH/2-HR*1.4-bob, 4, 8, 0, 0, Math.PI*2); cx.fill();
      cx.beginPath(); cx.ellipse(x+HR+3, y-BH/2-HR*1.4-bob, 4, 8, 0, 0, Math.PI*2); cx.fill();
      /* face re-overlay */
      cx.fillStyle = skinCol;
      cx.beginPath(); cx.roundRect(x-HR, y-BH/2-HR*2-bob, HR*2, HR*2+3, 10); cx.fill();
    }

    /* eyes */
    const eyeY = y - BH/2 - HR*1.6 + 4 - bob;
    cx.fillStyle = '#fff';
    cx.beginPath(); cx.ellipse(x-6, eyeY, 4, 5, 0, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.ellipse(x+6, eyeY, 4, 5, 0, 0, Math.PI*2); cx.fill();
    cx.fillStyle = p.isGirl ? '#6B3510' : '#2A5CC8';
    cx.beginPath(); cx.ellipse(x-6, eyeY+1, 2.5, 3.5, 0, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.ellipse(x+6, eyeY+1, 2.5, 3.5, 0, 0, Math.PI*2); cx.fill();
    cx.fillStyle = '#111';
    cx.beginPath(); cx.arc(x-6, eyeY+1, 1.2, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(x+6, eyeY+1, 1.2, 0, Math.PI*2); cx.fill();
    /* highlight */
    cx.fillStyle = '#fff';
    cx.beginPath(); cx.arc(x-4.5, eyeY-1.5, 1, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(x+7.5, eyeY-1.5, 1, 0, Math.PI*2); cx.fill();

    /* nose */
    cx.fillStyle = '#EDAC80';
    cx.beginPath(); cx.ellipse(x, eyeY+6, 3, 2, 0, 0, Math.PI*2); cx.fill();

    /* mouth */
    cx.strokeStyle = '#B03030'; cx.lineWidth = 1.8; cx.lineCap = 'round';
    cx.beginPath(); cx.arc(x, eyeY+11, p.isGirl?6:5, .1, Math.PI-.1); cx.stroke();

    /* name label above head */
    const lblY = y - BH/2 - HR*2 - 10 - bob;
    cx.font = "bold 13px 'Comic Sans MS',cursive";
    cx.textAlign='center'; cx.textBaseline='bottom';
    cx.strokeStyle='rgba(255,255,255,.9)'; cx.lineWidth=3;
    cx.strokeText(p.name, x, lblY);
    cx.fillStyle = p.color;
    cx.fillText(p.name, x, lblY);
  }

  /* ── HUD ── */
  _drawHUD() {
    const { W, helcia: h, tadzio: t, timeLeft, py2, btH } = this;
    const hudY = py2 + 8, hudH = btH - 14;

    /* Helcia */
    cx.fillStyle = 'rgba(220,50,130,0.88)';
    this._rr(8, hudY, 200, hudH, 8); cx.fill();
    cx.fillStyle = '#fff'; cx.textAlign='left'; cx.textBaseline='middle';
    cx.font = "bold 15px 'Comic Sans MS',cursive";
    cx.fillText('👧 Helcia', 18, hudY + hudH/2 - 10);
    cx.font = "bold 20px 'Comic Sans MS',cursive";
    cx.fillText(`${h.score} pkt`, 18, hudY + hudH/2 + 10);

    /* Tadzio */
    cx.fillStyle = 'rgba(40,100,220,0.88)';
    this._rr(W-208, hudY, 200, hudH, 8); cx.fill();
    cx.fillStyle = '#fff'; cx.textAlign='right';
    cx.font = "bold 15px 'Comic Sans MS',cursive";
    cx.fillText('Tadzio 👦', W-18, hudY + hudH/2 - 10);
    cx.font = "bold 20px 'Comic Sans MS',cursive";
    cx.fillText(`${t.score} pkt`, W-18, hudY + hudH/2 + 10);

    /* timer */
    const tick = timeLeft <= 10;
    cx.fillStyle = tick ? 'rgba(200,30,0,0.9)' : 'rgba(0,0,0,0.7)';
    this._rr(W/2-58, hudY, 116, hudH, 8); cx.fill();
    cx.fillStyle = '#fff';
    cx.font = `bold ${tick?28:22}px 'Comic Sans MS',cursive`;
    cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText(`⏱ ${timeLeft}s`, W/2, hudY + hudH/2);

    /* controls */
    cx.font = '11px Arial,sans-serif'; cx.fillStyle='rgba(80,40,0,.7)';
    cx.textAlign='left';  cx.textBaseline='top';
    cx.fillText('WASD — Helcia', 10, this.bkH + 4);
    cx.textAlign='right';
    cx.fillText('Tadzio — ◄▲▼►', W-10, this.bkH + 4);
  }

  _rr(x, y, w, h, r) {
    cx.beginPath();
    cx.moveTo(x+r,y); cx.lineTo(x+w-r,y); cx.arcTo(x+w,y,x+w,y+r,r);
    cx.lineTo(x+w,y+h-r); cx.arcTo(x+w,y+h,x+w-r,y+h,r);
    cx.lineTo(x+r,y+h); cx.arcTo(x,y+h,x,y+h-r,r);
    cx.lineTo(x,y+r); cx.arcTo(x,y,x+r,y,r);
    cx.closePath();
  }
}

/* ─── WIRING ──────────────────────────────────────────── */
let currentGame = null;
function startGame() {
  music.start();
  showScreen('game-screen');
  if (currentGame) currentGame.destroy();
  currentGame = new Game();
}
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('playAgainBtn').addEventListener('click', startGame);
</script>
