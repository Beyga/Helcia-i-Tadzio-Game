<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helcia i Tadzio – Gra Kuchenna!</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  background: #000;
}

.screen {
  position: absolute; inset: 0;
  display: none;
}
.screen.active { display: flex; }

/* ─── LANDING ─────────────────────────────────────────── */
#landing {
  flex-direction: column;
  align-items: stretch;
  /* kitchen wall tiles */
  background-color: #FFF5E0;
  background-image:
    linear-gradient(45deg, #E8D5A3 25%, transparent 25%),
    linear-gradient(-45deg, #E8D5A3 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #E8D5A3 75%),
    linear-gradient(-45deg, transparent 75%, #E8D5A3 75%);
  background-size: 80px 80px;
  background-position: 0 0, 0 40px, 40px -40px, -40px 0px;
}

/* top cabinet row */
.cabinet-top {
  width: 100%; height: clamp(90px, 13vh, 140px);
  background: linear-gradient(180deg, #5A3010 0%, #7B4A25 60%, #9B6B4A 100%);
  display: flex; align-items: center; padding: 10px 16px; gap: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  flex-shrink: 0; overflow: hidden;
}
.cab-door {
  flex: 1; height: 80%; max-width: 160px;
  background: linear-gradient(135deg, #A87550 0%, #7A5030 50%, #A87550 100%);
  border-radius: 7px; border: 3px solid #4A2808;
  position: relative;
  box-shadow: inset 0 2px 5px rgba(255,255,255,0.2), inset 0 -2px 5px rgba(0,0,0,0.25);
}
.cab-door::after {
  content: '';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 36px; height: 10px;
  background: linear-gradient(180deg, #D4A060 0%, #A07030 100%);
  border-radius: 5px; border: 1.5px solid #6B4820;
}

/* middle content */
.landing-mid {
  flex: 1; display: flex;
  align-items: center; justify-content: space-around;
  padding: 10px 5vw;
  overflow: hidden;
}

.char-col {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
}
.char-col svg {
  filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.3));
  animation: bob 3s ease-in-out infinite;
}
.char-col:nth-child(3) svg { animation-delay: -1.5s; }
@keyframes bob {
  0%,100% { transform: translateY(0px) rotate(-1deg); }
  50%      { transform: translateY(-12px) rotate(1deg); }
}
.char-name {
  font-size: clamp(22px, 3vw, 38px);
  font-weight: 900; color: #5A3010;
  text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
}
.controls-tag {
  font-size: clamp(13px, 1.6vw, 20px);
  background: rgba(255,255,255,0.75);
  padding: 4px 14px; border-radius: 20px; color: #6B4020;
}

/* title block */
.title-block {
  text-align: center; display: flex; flex-direction: column;
  align-items: center; gap: clamp(10px, 2vh, 24px);
}
.game-title {
  font-size: clamp(36px, 7vw, 96px);
  font-weight: 900; line-height: 1.05;
  color: #8B2000;
  text-shadow:
    4px 4px 0 #FF8C00,
    8px 8px 0 rgba(0,0,0,0.18);
}
.game-sub {
  font-size: clamp(16px, 2.2vw, 28px);
  color: #7B4820;
  background: rgba(255,255,255,0.75);
  padding: 8px 24px; border-radius: 24px;
}
.start-btn {
  font-size: clamp(22px, 3vw, 42px);
  font-weight: 900;
  font-family: inherit;
  background: linear-gradient(180deg, #FF7035 0%, #E63000 100%);
  color: #fff;
  border: 4px solid #B02000;
  border-radius: 60px;
  padding: clamp(12px,2vh,20px) clamp(30px,5vw,70px);
  cursor: pointer;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  box-shadow: 0 7px 0 #B02000, 0 9px 18px rgba(0,0,0,0.3);
  transition: transform .1s, box-shadow .1s;
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.06); }
}
.start-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 0 #B02000, 0 12px 22px rgba(0,0,0,0.3); }
.start-btn:active { transform: translateY(5px);  box-shadow: 0 2px 0  #B02000, 0 4px 10px rgba(0,0,0,0.2); animation: none; }

/* bottom counter */
.counter-bottom {
  width: 100%; height: clamp(60px, 9vh, 100px);
  background: linear-gradient(180deg, #9B6B4A 0%, #7A4A28 100%);
  border-top: 6px solid #4A2808;
  display: flex; align-items: center; justify-content: space-evenly;
  padding: 0 20px; flex-shrink: 0;
}
.counter-bottom span { font-size: clamp(28px, 4vw, 50px); }

/* ─── GAME SCREEN ─────────────────────────────────────── */
#game-screen {
  background: #000;
}
#gameCanvas {
  display: block;
  width: 100%; height: 100%;
}

/* ─── RESULT SCREEN ───────────────────────────────────── */
#result-screen {
  flex-direction: column; align-items: center; justify-content: center;
  gap: 28px;
  background: radial-gradient(ellipse at center, rgba(80,30,0,0.92) 0%, rgba(20,10,0,0.97) 100%);
}
.result-winner {
  font-size: clamp(40px, 8vw, 90px);
  font-weight: 900; color: #FFD700;
  text-shadow: 3px 3px 0 #FF8C00, 6px 6px 20px rgba(255,200,0,0.5);
  text-align: center;
}
.result-scores {
  font-size: clamp(22px, 3.5vw, 42px);
  color: #FFF8E0;
  text-align: center; line-height: 1.9;
}
.play-again-btn {
  font-size: clamp(20px, 2.8vw, 36px);
  font-weight: 900; font-family: inherit;
  background: linear-gradient(180deg, #4CD964 0%, #228B22 100%);
  color: #fff; border: 4px solid #145214;
  border-radius: 60px;
  padding: 14px 55px; cursor: pointer;
  box-shadow: 0 7px 0 #145214;
  text-shadow: 1px 2px 0 rgba(0,0,0,0.3);
}
.play-again-btn:hover { transform: translateY(-2px); }
.play-again-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 #145214; }
</style>
</head>

<script>
'use strict';

/* ─────────────────────────────────────────────────────────────
   CABINET DOOR GENERATOR (landing)
───────────────────────────────────────────────────────────── */
(function buildCabinets() {
  const el = document.getElementById('cabTop');
  const count = Math.ceil(window.innerWidth / 174) + 1;
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'cab-door';
    el.appendChild(d);
  }
})();

/* ─────────────────────────────────────────────────────────────
   SCREEN HELPER
───────────────────────────────────────────────────────────── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ─────────────────────────────────────────────────────────────
   BACKGROUND MUSIC  (Web Audio API)
───────────────────────────────────────────────────────────── */
class Music {
  constructor() {
    this.ctx = null;
    this.active = false;
    this.nextLoopAt = 0;
    this._schedTimer = null;

    // Cheerful 8-bar melody in C major — "kitchen folk" feel
    const C4=261.63,D4=293.66,E4=329.63,F4=349.23,G4=392,A4=440,B4=493.88,
          C5=523.25,D5=587.33,E5=659.25,G5=784;
    this.melody = [
      [E5,.18],[E5,.18],[R=0,.10],[E5,.18],[R,.10],[C5,.18],[E5,.36],[G5,.36],[G4,.36],
      [C5,.27],[G4,.18],[R,.18],[E4,.27],[A4,.18],[B4,.18],[Bb4=466.16,.18],[A4,.36],
      [G4,.24],[E5,.24],[G5,.24],[A5=880,.36],[F5=698.46,.18],[G5,.18],[R,.18],[E5,.36],[C5,.18],[D5,.18],[B4,.36],
      [C5,.27],[G4,.18],[R,.18],[E4,.27],[A4,.18],[B4,.18],[Bb4,.18],[A4,.36],
      [G4,.24],[E5,.24],[G5,.24],[A5,.36],[F5,.18],[G5,.18],[R,.18],[E5,.36],[C5,.18],[D5,.18],[B4,.36],
    ];
    this.totalDur = this.melody.reduce((s,[,d])=>s+d, 0);
  }

  start() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.active = true;
    this.scheduleLoop(this.ctx.currentTime + 0.05);
  }

  scheduleLoop(t0) {
    if (!this.active) return;
    let t = t0;
    for (const [freq, dur] of this.melody) {
      if (freq) {
        this._note(freq,    t, dur * .88, 'square',   .07);
        this._note(freq/2,  t, dur * .45, 'triangle', .04);
      }
      t += dur;
    }
    this.nextLoopAt = t0 + this.totalDur;
    const waitMs = Math.max(0, (this.nextLoopAt - this.ctx.currentTime - .6) * 1000);
    this._schedTimer = setTimeout(() => this.scheduleLoop(this.nextLoopAt), waitMs);
  }

  _note(freq, t, dur, type, vol) {
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.connect(g); g.connect(this.ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur + .02);
  }

  stop() {
    this.active = false;
    clearTimeout(this._schedTimer);
    if (this.ctx) { this.ctx.close(); this.ctx = null; }
  }
}

const music = new Music();

/* ─────────────────────────────────────────────────────────────
   CANVAS GAME
───────────────────────────────────────────────────────────── */
const canvas = document.getElementById('gameCanvas');
const c = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

/* ── palette & sizes derived from canvas ── */
const FOODS = ['🍎','🥕','🥔','🍅','🥦','🧅','🍋','🥒','🍄','🍓','🫐','🍇','🧁','🍕','🧀'];

/* Character proportions – all relative to FLOOR_Y (feet anchor) */
const CHAR_H     = 170;  // total height in px
const HEAD_R     = 34;   // head radius
const BODY_TOP   = 75;   // px above FLOOR_Y where body top sits
const BODY_BOT   = 25;   // px above FLOOR_Y where body ends / legs start
const ARM_Y      = 58;   // px above FLOOR_Y for arm midpoint
const CATCH_HALF = 70;   // half-width of catch zone (arm reach)

class Game {
  constructor() {
    this.W = canvas.width;
    this.H = canvas.height;
    this.CAB_H   = Math.floor(this.H * 0.12);
    this.FLOOR_Y = Math.floor(this.H * 0.82);
    this.CTR_H   = Math.floor(this.H * 0.09);

    /* Helcia – left half */
    this.helcia = {
      name: 'Helcia', x: this.W * 0.18,
      speed: 7, score: 0, lives: 3,
      color: '#E0458A', isGirl: true,
      minX: CATCH_HALF + 10,
      maxX: this.W / 2 - CATCH_HALF - 5,
    };
    /* Tadzio – right half */
    this.tadzio = {
      name: 'Tadzio', x: this.W * 0.82,
      speed: 7, score: 0, lives: 3,
      color: '#3A6FD8', isGirl: false,
      minX: this.W / 2 + CATCH_HALF + 5,
      maxX: this.W - CATCH_HALF - 10,
    };

    this.foods   = [];
    this.effects = [];
    this.misses  = [];
    this.frame   = 0;
    this.timeLeft = 60;
    this.spawnEvery = 80;
    this.running = true;
    this.keys    = {};

    const GAME_KEYS = new Set(['a','A','d','D','ArrowLeft','ArrowRight','ArrowUp','ArrowDown']);
    this._onKey = (e) => {
      if (GAME_KEYS.has(e.key)) e.preventDefault();
      this.keys[e.key] = (e.type === 'keydown');
    };
    window.addEventListener('keydown', this._onKey);
    window.addEventListener('keyup',   this._onKey);

    requestAnimationFrame(() => this._loop());
  }

  destroy() {
    this.running = false;
    window.removeEventListener('keydown', this._onKey);
    window.removeEventListener('keyup',   this._onKey);
  }

  _loop() {
    if (!this.running) return;
    this.W = canvas.width; this.H = canvas.height;
    this._update();
    this._draw();
    requestAnimationFrame(() => this._loop());
  }

  /* ── UPDATE ── */
  _update() {
    this.frame++;

    if (this.frame % 60 === 0) {
      this.timeLeft = Math.max(0, this.timeLeft - 1);
      if (this.timeLeft === 0) { this._end(); return; }
    }

    this._movePlayer(this.helcia, this.keys['a'] || this.keys['A'], this.keys['d'] || this.keys['D']);
    this._movePlayer(this.tadzio, this.keys['ArrowLeft'], this.keys['ArrowRight']);

    this.spawnEvery = Math.max(40, 80 - Math.floor((60 - this.timeLeft) / 8) * 5);
    if (this.frame % this.spawnEvery === 0) this._spawnFood();

    const catchY = this.FLOOR_Y - ARM_Y;

    for (const f of this.foods) {
      f.y += f.vy;
      if (f.caught || f.missed) { f.alpha -= 0.06; continue; }

      if (f.y >= catchY) {
        if (Math.abs(f.x - this.helcia.x) < CATCH_HALF) {
          f.caught = true; this.helcia.score++;
          this._spark(f.x, f.y, this.helcia.color); continue;
        }
        if (Math.abs(f.x - this.tadzio.x) < CATCH_HALF) {
          f.caught = true; this.tadzio.score++;
          this._spark(f.x, f.y, this.tadzio.color); continue;
        }
      }

      if (f.y >= this.FLOOR_Y + 10) {
        f.missed = true;
        const closer = Math.abs(f.x - this.helcia.x) < Math.abs(f.x - this.tadzio.x)
          ? this.helcia : this.tadzio;
        closer.lives = Math.max(0, closer.lives - 1);
        this.misses.push({ x: f.x, y: this.FLOOR_Y, alpha: 1 });
        if (this.helcia.lives === 0 || this.tadzio.lives === 0) { this._end(); return; }
      }
    }
    this.foods = this.foods.filter(f => f.alpha > 0);

    for (const e of this.effects) { e.r += 4; e.alpha -= .07; }
    this.effects = this.effects.filter(e => e.alpha > 0);
    for (const m of this.misses)  { m.alpha -= .04; }
    this.misses  = this.misses.filter(m => m.alpha > 0);
  }

  _movePlayer(p, left, right) {
    if (left)  p.x -= p.speed;
    if (right) p.x += p.speed;
    p.x = Math.max(p.minX, Math.min(p.maxX, p.x));
  }

  _spawnFood() {
    const margin = 80;
    this.foods.push({
      x: margin + Math.random() * (this.W - margin * 2),
      y: this.CAB_H + 10,
      vy: 2.5 + Math.random() * 3.5,
      emoji: FOODS[Math.floor(Math.random() * FOODS.length)],
      size: 40,
      caught: false, missed: false, alpha: 1,
    });
  }

  _spark(x, y, col) {
    this.effects.push({ x, y, r: 8, color: col, alpha: 1 });
  }

  _end() {
    this.running = false;
    const h = this.helcia, t = this.tadzio;
    const title = h.score > t.score ? '🎉 Helcia wygrywa! 🎉'
                : t.score > h.score ? '🎉 Tadzio wygrywa! 🎉'
                : '🤝 Remis! Oboje świetni! 🤝';
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultScores').innerHTML =
      `👧 Helcia: <strong>${h.score}</strong> pkt &nbsp;|&nbsp; Tadzio: <strong>${t.score}</strong> pkt 👦`;
    setTimeout(() => showScreen('result-screen'), 600);
  }

  /* ── DRAW ── */
  _draw() {
    c.clearRect(0, 0, this.W, this.H);
    this._drawBg();
    this._drawFoods();
    this._drawEffects();
    this._drawPlayer(this.helcia);
    this._drawPlayer(this.tadzio);
    this._drawHUD();
    this._drawDivider();
  }

  _drawBg() {
    const { W, H, CAB_H, FLOOR_Y, CTR_H } = this;

    /* wall tiles */
    const ts = 68;
    for (let tx = 0; tx < W; tx += ts)
      for (let ty = CAB_H; ty < FLOOR_Y; ty += ts) {
        const r = Math.floor((ty - CAB_H) / ts), col = Math.floor(tx / ts);
        c.fillStyle = (r + col) % 2 === 0 ? '#F8EDCF' : '#EDE0B8';
        c.fillRect(tx, ty, ts, ts);
        c.strokeStyle = '#D4C090'; c.lineWidth = .7;
        c.strokeRect(tx, ty, ts, ts);
      }

    /* floor checkered */
    const fs = 72;
    for (let tx = 0; tx < W; tx += fs)
      for (let ty = FLOOR_Y; ty < H - CTR_H; ty += fs) {
        const r = Math.floor((ty - FLOOR_Y) / fs), col = Math.floor(tx / fs);
        c.fillStyle = (r + col) % 2 === 0 ? '#F0E8C0' : '#CEC080';
        c.fillRect(tx, ty, fs, fs);
        c.strokeStyle = '#B8A860'; c.lineWidth = .5;
        c.strokeRect(tx, ty, fs, fs);
      }

    /* baseboard */
    c.fillStyle = '#7A5030';
    c.fillRect(0, FLOOR_Y - 8, W, 8);

    /* top cabinets */
    c.fillStyle = '#5A3010';
    c.fillRect(0, 0, W, CAB_H);
    const sg = c.createLinearGradient(0, CAB_H - 12, 0, CAB_H + 12);
    sg.addColorStop(0, 'rgba(0,0,0,.35)'); sg.addColorStop(1, 'rgba(0,0,0,0)');
    c.fillStyle = sg; c.fillRect(0, CAB_H - 10, W, 22);

    const dW = Math.min(160, W / 7), gap = 16, total = dW + gap;
    const startX = (W % total) / 2;
    const count = Math.ceil(W / total) + 1;
    for (let i = 0; i < count; i++) {
      const dx = startX + i * total - gap / 2, dy = 8, dh = CAB_H - 16;
      const dg = c.createLinearGradient(dx, dy, dx, dy + dh);
      dg.addColorStop(0, '#C08050'); dg.addColorStop(.4, '#9B6B40'); dg.addColorStop(1, '#7A4828');
      c.fillStyle = dg; this._rr(dx, dy, dW, dh, 6); c.fill();
      c.strokeStyle = '#4A2408'; c.lineWidth = 2.5; this._rr(dx, dy, dW, dh, 6); c.stroke();
      c.strokeStyle = 'rgba(255,255,255,.18)'; c.lineWidth = 1;
      this._rr(dx + 5, dy + 5, dW - 10, dh - 10, 4); c.stroke();
      c.fillStyle = '#D4A050'; this._rr(dx + dW / 2 - 18, dy + dh / 2 - 5, 36, 10, 5); c.fill();
      c.strokeStyle = '#8B5820'; c.lineWidth = 1.5; c.stroke();
    }

    /* bottom counter */
    const cy = H - CTR_H;
    const cg = c.createLinearGradient(0, cy, 0, H);
    cg.addColorStop(0, '#A07048'); cg.addColorStop(1, '#6B4020');
    c.fillStyle = cg; c.fillRect(0, cy, W, CTR_H);
    c.fillStyle = '#4A2808'; c.fillRect(0, cy, W, 7);
    c.fillStyle = 'rgba(255,255,255,.15)'; c.fillRect(0, cy + 7, W, 4);
    const items = ['🍳', '🥘', '🍲', '☕', '🥄', '🍴', '🧂'];
    const emSz = Math.min(CTR_H * .65, 44);
    c.font = `${emSz}px serif`; c.textBaseline = 'middle'; c.textAlign = 'center';
    items.forEach((it, i) => c.fillText(it, (W / (items.length + 1)) * (i + 1), cy + CTR_H / 2));

    /* side accents */
    c.fillStyle = '#DDDDE4'; c.fillRect(0, CAB_H, 18, FLOOR_Y - CAB_H);
    c.fillStyle = '#CCC';
    const hh = (FLOOR_Y - CAB_H - 32) / 2;
    c.fillRect(2, CAB_H + 16, 14, hh - 4);
    c.fillRect(2, CAB_H + 16 + hh, 14, hh - 4);
    c.fillStyle = '#DDDDE4'; c.fillRect(W - 18, CAB_H, 18, FLOOR_Y - CAB_H);
  }

  _drawDivider() {
    c.save();
    c.setLineDash([12, 10]);
    c.strokeStyle = 'rgba(0,0,0,0.1)';
    c.lineWidth = 2;
    c.beginPath();
    c.moveTo(this.W / 2, this.CAB_H + 10);
    c.lineTo(this.W / 2, this.FLOOR_Y);
    c.stroke();
    c.setLineDash([]);
    c.restore();
  }

  /* ── CHARACTER DRAWING ──────────────────────────────────
     All positions are relative to (px, FLOOR_Y) — the foot anchor.
     Positive offsets go UP (subtract from FLOOR_Y).
  ───────────────────────────────────────────────────────── */
  _drawPlayer(p) {
    const fx = p.x;               // foot center x
    const fy = this.FLOOR_Y;      // foot anchor y

    /* ── shoes ── */
    c.fillStyle = '#2A1A0A';
    c.beginPath(); c.ellipse(fx - 18, fy - 3, 20, 9, -0.15, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.ellipse(fx + 18, fy - 3, 20, 9,  0.15, 0, Math.PI * 2); c.fill();

    /* ── legs ── */
    const legColor = p.isGirl ? '#CC2266' : '#1848B0';
    c.fillStyle = legColor;
    // left leg
    c.beginPath();
    c.roundRect(fx - 30, fy - BODY_BOT - 40, 22, 42, 5);
    c.fill();
    // right leg
    c.beginPath();
    c.roundRect(fx + 8, fy - BODY_BOT - 40, 22, 42, 5);
    c.fill();

    /* ── body / torso ── */
    const bodyColor1 = p.isGirl ? '#FF75B0' : '#4A8FEC';
    const bodyColor2 = p.isGirl ? '#E0207A' : '#1848B0';
    const bg = c.createLinearGradient(fx - 38, fy - BODY_TOP, fx + 38, fy - BODY_BOT);
    bg.addColorStop(0, bodyColor1); bg.addColorStop(1, bodyColor2);
    c.fillStyle = bg;
    c.beginPath();
    c.roundRect(fx - 38, fy - BODY_TOP, 76, BODY_TOP - BODY_BOT, 12);
    c.fill();
    // collar / neckline
    c.fillStyle = p.isGirl ? '#FF9DC8' : '#7AB0F0';
    c.beginPath();
    c.ellipse(fx, fy - BODY_TOP + 10, 18, 10, 0, 0, Math.PI * 2);
    c.fill();

    /* ── arms (outstretched to catch) ── */
    const armColor = p.isGirl ? '#FF75B0' : '#4A8FEC';
    c.strokeStyle = armColor;
    c.lineWidth = 18; c.lineCap = 'round';
    // left arm: shoulder → tip
    c.beginPath();
    c.moveTo(fx - 34, fy - (BODY_TOP - 14));
    c.lineTo(fx - CATCH_HALF - 8, fy - ARM_Y);
    c.stroke();
    // right arm
    c.beginPath();
    c.moveTo(fx + 34, fy - (BODY_TOP - 14));
    c.lineTo(fx + CATCH_HALF + 8, fy - ARM_Y);
    c.stroke();
    // hands (skin-coloured circles)
    c.fillStyle = '#FFD0A0';
    c.beginPath(); c.arc(fx - CATCH_HALF - 8, fy - ARM_Y, 13, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(fx + CATCH_HALF + 8, fy - ARM_Y, 13, 0, Math.PI * 2); c.fill();

    /* ── neck ── */
    c.fillStyle = '#FFD0A0';
    c.fillRect(fx - 10, fy - BODY_TOP - 12, 20, 18);

    /* ── head (square-ish via roundRect) ── */
    const hcx = fx, hcy = fy - BODY_TOP - HEAD_R - 10;
    c.fillStyle = '#FFDCB4';
    c.beginPath();
    c.roundRect(hcx - HEAD_R, hcy - HEAD_R, HEAD_R * 2, HEAD_R * 2 + 4, 18);
    c.fill();

    /* ── hair ── */
    if (p.isGirl) {
      /* Helcia – chestnut/warm-brown, medium length with side waves */
      const hc = '#9B5020'; // warm chestnut
      // back volume (behind head)
      c.fillStyle = hc;
      c.beginPath();
      c.ellipse(hcx, hcy + 6, HEAD_R + 10, HEAD_R + 14, 0, 0, Math.PI * 2);
      c.fill();
      // top cap
      c.fillStyle = hc;
      c.beginPath();
      c.roundRect(hcx - HEAD_R - 4, hcy - HEAD_R - 12, (HEAD_R + 4) * 2, HEAD_R * 0.8, 20);
      c.fill();
      // face overlay (skin) so hair goes behind/above face
      c.fillStyle = '#FFDCB4';
      c.beginPath();
      c.roundRect(hcx - HEAD_R, hcy - HEAD_R, HEAD_R * 2, HEAD_R * 2 + 4, 18);
      c.fill();
      // fringe strands
      c.fillStyle = hc;
      for (let fi = -1; fi <= 1; fi++) {
        c.beginPath();
        c.ellipse(hcx + fi * 14, hcy - HEAD_R + 4, 9, 13, fi * 0.15, 0, Math.PI * 2);
        c.fill();
      }
      // side waves (hanging past ears)
      c.beginPath(); c.ellipse(hcx - HEAD_R - 5, hcy + 12, 10, 24, -0.2, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.ellipse(hcx + HEAD_R + 5, hcy + 12, 10, 24,  0.2, 0, Math.PI * 2); c.fill();
    } else {
      /* Tadzio – golden-blonde mushroom / bowl cut:
         flat fringe across forehead, rounded bowl on top, covers ears */
      const hc = '#D4B030';
      // bowl cap (rounded top)
      c.fillStyle = hc;
      c.beginPath();
      c.arc(hcx, hcy - 4, HEAD_R + 8, Math.PI, 0);
      c.fill();
      // flat fringe band across forehead
      c.fillStyle = hc;
      c.fillRect(hcx - HEAD_R - 8, hcy - HEAD_R + 10, (HEAD_R + 8) * 2, HEAD_R * 0.55);
      // ear cover flaps (mushroom sides hanging over ears)
      c.beginPath(); c.ellipse(hcx - HEAD_R - 4, hcy + 6, 10, 20, 0, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.ellipse(hcx + HEAD_R + 4, hcy + 6, 10, 20, 0, 0, Math.PI * 2); c.fill();
      // face overlay
      c.fillStyle = '#FFE0B0';
      c.beginPath();
      c.roundRect(hcx - HEAD_R, hcy - HEAD_R, HEAD_R * 2, HEAD_R * 2 + 4, 18);
      c.fill();
    }

    /* ── ears ── */
    c.fillStyle = '#FFDCB4';
    c.beginPath(); c.ellipse(hcx - HEAD_R,     hcy + 4, 8, 11, 0, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.ellipse(hcx + HEAD_R,     hcy + 4, 8, 11, 0, 0, Math.PI * 2); c.fill();

    /* ── eyebrows ── */
    const browColor = p.isGirl ? '#7B3A10' : '#8B6A10';
    c.strokeStyle = browColor; c.lineWidth = 3.5; c.lineCap = 'round';
    c.beginPath(); c.moveTo(hcx - HEAD_R * .7, hcy - 10); c.quadraticCurveTo(hcx - HEAD_R * .35, hcy - 16, hcx - 2, hcy - 11); c.stroke();
    c.beginPath(); c.moveTo(hcx + 2, hcy - 11); c.quadraticCurveTo(hcx + HEAD_R * .35, hcy - 16, hcx + HEAD_R * .7, hcy - 10); c.stroke();

    /* ── eyes ── */
    c.fillStyle = '#fff';
    c.beginPath(); c.ellipse(hcx - 13, hcy - 1, 10, 12, 0, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.ellipse(hcx + 13, hcy - 1, 10, 12, 0, 0, Math.PI * 2); c.fill();
    // iris
    c.fillStyle = p.isGirl ? '#6B3510' : '#2A5CC8';
    c.beginPath(); c.ellipse(hcx - 13, hcy, 6.5, 8, 0, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.ellipse(hcx + 13, hcy, 6.5, 8, 0, 0, Math.PI * 2); c.fill();
    // pupil
    c.fillStyle = '#111';
    c.beginPath(); c.ellipse(hcx - 13, hcy + .5, 3.5, 4.5, 0, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.ellipse(hcx + 13, hcy + .5, 3.5, 4.5, 0, 0, Math.PI * 2); c.fill();
    // highlight
    c.fillStyle = '#fff';
    c.beginPath(); c.arc(hcx - 10, hcy - 3, 2.5, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.arc(hcx + 16, hcy - 3, 2.5, 0, Math.PI * 2); c.fill();

    /* ── nose ── */
    c.fillStyle = '#EDAC80';
    c.beginPath(); c.ellipse(hcx, hcy + 12, 6, 4, 0, 0, Math.PI * 2); c.fill();

    /* ── cheeks ── */
    c.fillStyle = p.isGirl ? 'rgba(255,100,150,0.45)' : 'rgba(255,140,100,0.35)';
    c.beginPath(); c.ellipse(hcx - 20, hcy + 14, 13, 9, 0, 0, Math.PI * 2); c.fill();
    c.beginPath(); c.ellipse(hcx + 20, hcy + 14, 13, 9, 0, 0, Math.PI * 2); c.fill();

    /* ── mouth ── */
    if (p.isGirl) {
      // big open smile like in photo
      c.strokeStyle = '#B03030'; c.lineWidth = 3; c.lineCap = 'round';
      c.beginPath(); c.arc(hcx, hcy + 22, 14, 0.1, Math.PI - 0.1); c.stroke();
      c.fillStyle = '#fff';
      c.beginPath(); c.arc(hcx, hcy + 22, 14, 0.1, Math.PI - 0.1); c.fill();
      c.strokeStyle = '#C09080'; c.lineWidth = 1;
      for (let ti = -1; ti <= 1; ti++) {
        c.beginPath(); c.moveTo(hcx + ti * 7, hcy + 22); c.lineTo(hcx + ti * 7, hcy + 34); c.stroke();
      }
    } else {
      // slight grin
      c.strokeStyle = '#B03030'; c.lineWidth = 3; c.lineCap = 'round';
      c.beginPath(); c.arc(hcx, hcy + 22, 10, 0.2, Math.PI - 0.2); c.stroke();
    }

    /* ── name tag ── */
    const tagY = fy - CHAR_H - 8;
    c.font = "bold 18px 'Comic Sans MS', cursive";
    c.textAlign = 'center'; c.textBaseline = 'bottom';
    c.strokeStyle = 'rgba(255,255,255,0.95)'; c.lineWidth = 4;
    c.strokeText(p.name, fx, tagY);
    c.fillStyle = p.color;
    c.fillText(p.name, fx, tagY);
  }

  _drawFoods() {
    for (const f of this.foods) {
      if (f.alpha <= 0) continue;
      c.save();
      c.globalAlpha = f.alpha;
      c.font = `${f.size}px serif`;
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText(f.emoji, f.x, f.y);
      c.restore();
    }
  }

  _drawEffects() {
    for (const e of this.effects) {
      c.save(); c.globalAlpha = e.alpha;
      c.strokeStyle = e.color; c.lineWidth = 3;
      c.beginPath(); c.arc(e.x, e.y, e.r, 0, Math.PI * 2); c.stroke();
      c.strokeStyle = '#FFD700'; c.lineWidth = 1.5;
      c.beginPath(); c.arc(e.x, e.y, e.r * .6, 0, Math.PI * 2); c.stroke();
      c.restore();
    }
    for (const m of this.misses) {
      c.save(); c.globalAlpha = m.alpha;
      c.font = 'bold 30px serif'; c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText('💥', m.x, m.y);
      c.restore();
    }
  }

  _drawHUD() {
    const { W, CAB_H, helcia, tadzio, timeLeft } = this;
    const bY = CAB_H + 8, bH = 52, bW = 230;

    /* Helcia */
    c.fillStyle = 'rgba(220,50,130,0.85)';
    this._rr(8, bY, bW, bH, 10); c.fill();
    c.fillStyle = '#fff';
    c.font = "bold 17px 'Comic Sans MS', cursive";
    c.textAlign = 'left'; c.textBaseline = 'middle';
    c.fillText(`👧 Helcia: ${helcia.score} pkt`, 18, bY + bH / 2 - 9);
    c.fillText('❤️'.repeat(helcia.lives) + '🖤'.repeat(3 - helcia.lives), 18, bY + bH / 2 + 13);

    /* Tadzio */
    c.fillStyle = 'rgba(40,100,220,0.85)';
    this._rr(W - bW - 8, bY, bW, bH, 10); c.fill();
    c.fillStyle = '#fff'; c.textAlign = 'right';
    c.fillText(`Tadzio: ${tadzio.score} pkt 👦`, W - 18, bY + bH / 2 - 9);
    c.fillText('❤️'.repeat(tadzio.lives) + '🖤'.repeat(3 - tadzio.lives), W - 18, bY + bH / 2 + 13);

    /* Timer */
    const ticking = timeLeft <= 10;
    c.fillStyle = `rgba(0,0,0,${ticking ? .75 : .6})`;
    this._rr(W / 2 - 65, bY, 130, bH, 10); c.fill();
    if (ticking) { c.fillStyle = 'rgba(255,50,0,.3)'; this._rr(W / 2 - 65, bY, 130, bH, 10); c.fill(); }
    c.fillStyle = ticking ? '#FF5500' : '#FFF';
    c.font = `bold ${ticking ? 28 : 22}px 'Comic Sans MS', cursive`;
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(`⏱ ${timeLeft}s`, W / 2, bY + bH / 2);

    /* controls hint */
    c.font = '13px Arial, sans-serif';
    c.fillStyle = 'rgba(80,40,0,.7)';
    c.textAlign = 'left';  c.textBaseline = 'top';
    c.fillText('A / D ← Helcia', 10, CAB_H - 20);
    c.textAlign = 'right';
    c.fillText('Tadzio → ◄ ►', W - 10, CAB_H - 20);
  }

  _rr(x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y); c.arcTo(x + w, y, x + w, y + r, r);
    c.lineTo(x + w, y + h - r); c.arcTo(x + w, y + h, x + w - r, y + h, r);
    c.lineTo(x + r, y + h); c.arcTo(x, y + h, x, y + h - r, r);
    c.lineTo(x, y + r); c.arcTo(x, y, x + r, y, r);
    c.closePath();
  }
}

/* ─────────────────────────────────────────────────────────────
   WIRING
───────────────────────────────────────────────────────────── */
let currentGame = null;

function startGame() {
  music.start();
  showScreen('game-screen');
  if (currentGame) currentGame.destroy();
  currentGame = new Game();
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('playAgainBtn').addEventListener('click', startGame);
</script>
